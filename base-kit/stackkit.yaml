# StackKit Metadata and Mode Configuration
apiVersion: stackkit/v1
kind: StackKit

metadata:
  name: base-kit
  version: "5.0.0"
  description: "Single-environment homelab with Photos, Media, and Vault"
  author: "kombify Stack Team"
  license: "Apache-2.0"
  repository: "https://github.com/kombifyio/stackkits"
  tags:
    - homelab
    - single-node
    - docker
    - traefik
    - dokploy
    - professional

# Supported operating systems
supportedOS:
  - ubuntu-24
  - ubuntu-22
  - debian-12

# Resource requirements
requirements:
  minimum:
    cpu: 2
    memory: 2
    disk: 10
  recommended:
    cpu: 4
    memory: 4
    disk: 20

# =============================================================================
# DEPLOYMENT MODES (Available for all StackKits)
# =============================================================================
modes:
  # Simple Mode: OpenTofu-only with Go integration
  simple:
    description: "OpenTofu-only deployment via kombify Stack Core"
    templateDir: "templates/simple"
    engine: "opentofu"
    features:
      - "Direct OpenTofu execution"
      - "Go-based state management"
      - "Simple rollback via state"
    recommended_for:
      - "Single node deployments"
      - "Quick setup without drift detection"
      - "Users new to infrastructure-as-code"
      - "Development and testing"

  # Advanced Mode: Terramate with drift detection
  advanced:
    description: "Terramate-orchestrated deployment with drift detection"
    templateDir: "templates/advanced"
    engine: "terramate"
    requires:
      - "terramate >= 0.5.0"
    features:
      - "Drift detection on schedule"
      - "Granular stack orchestration"
      - "Day-2 operations support"
      - "Gradual rollouts"
    recommended_for:
      - "Production environments"
      - "Compliance requirements"
      - "Multi-stack coordination"
    stacks:
      - name: network
        order: 1
        description: "Docker networks and DNS"
      - name: services
        order: 2
        after: [network]
        description: "Core services (Traefik, monitoring)"
      - name: applications
        order: 3
        after: [services]
        description: "User applications via Dokploy"

# Auto-selection rules
autoSelect:
  advancedWhen:
    - "driftDetection.enabled == true"
    - "autoUpdates.enabled == true"
    - "compliance.required == true"
  default: simple

# =============================================================================
# USE CASES (v5 — replaces variants)
# =============================================================================
# Role: default = ships enabled, alternative = curated swap, optional = user enables
# Source of truth: admin-center (admin_sk_stackkit_tools). This section mirrors it for Level 0 CLI.
useCases:
  photos:
    role: default
    defaultTool: immich
    alternatives: [ente-photos]
    description: "Photo gallery and memories"
  media:
    role: default
    defaultTool: jellyfin
    alternatives: []
    description: "Media streaming with automated library management"
  vault:
    role: default
    defaultTool: vaultwarden
    alternatives: []
    description: "Password management and secure notes"
  smart-home:
    role: optional
    defaultTool: home-assistant
    alternatives: []
    description: "Home automation with IoT device control"
  files:
    role: optional
    defaultTool: cloudreve
    alternatives: [nextcloud]
    description: "File sharing and cloud storage"
  ai:
    role: optional
    defaultTool: ollama
    alternatives: []
    description: "Local AI/LLM inference"
  dev:
    role: optional
    defaultTool: gitea
    alternatives: []
    description: "Self-hosted Git and CI/CD"
  mail:
    role: optional
    defaultTool: stalwart
    alternatives: []
    description: "Self-hosted email server"
  game:
    role: optional
    defaultTool: null
    alternatives: []
    description: "Game server hosting"
  remote:
    role: optional
    defaultTool: guacamole
    alternatives: []
    description: "Remote desktop access"

# Platform services (always present, non-negotiable)
platform:
  traefik:
    role: default
    alternatives: []
  tinyauth:
    role: default
    alternatives: []
  pocketid:
    role: default
    alternatives: []
  paas:
    role: default
    defaultTool: dokploy
    alternatives: [coolify, dockge]
  monitoring:
    role: default
    defaultTool: uptime-kuma
    alternatives: [beszel]
  dashboard:
    role: default
    alternatives: []

# Feature flags
features:
  multiNode: false
  cloudProviders: false
  vpnOverlay: false
  gpuSupport: false
  highAvailability: false

# Compute tier adjustments
computeTiers:
  high:
    requirements:
      cpu: 8
      memory: 16
      disk: 20
    additionalServices:
      - prometheus
      - grafana
  standard:
    requirements:
      cpu: 4
      memory: 8
      disk: 10
    additionalServices: []
  low:
    requirements:
      cpu: 2
      memory: 4
      disk: 5
    paasOverride: dockge
    serviceOverrides:
      dokploy: disabled
      uptime-kuma: disabled

# =============================================================================
# SERVICE OUTPUTS (URLs and Credentials)
# =============================================================================
outputs:
  format: "markdown"
  include:
    - serviceUrls
    - credentials
    - healthEndpoints
  template: |
    # 🏠 Base Kit - Deployed Services
    
    ## Service URLs
    {{range .services}}
    - **{{.displayName}}**: [{{.output.url}}]({{.output.url}})
      {{.output.description}}
    {{end}}
    
    ## Quick Access
    | Service | URL | Notes |
    |---------|-----|-------|
    {{range .services}}
    | {{.displayName}} | {{.output.url}} | {{.output.credentials.note}} |
    {{end}}

# Changelog
changelog:
  - version: "2.0.0"
    date: "2025-01-27"
    changes:
      - "NEW: Dokploy as default PaaS platform"
      - "NEW: Uptime Kuma for monitoring (default)"
      - "NEW: Beszel as alternative monitoring option"
      - "NEW: Whoami test container for verification"
      - "NEW: Service URLs output in deployment summary"
      - "CHANGED: Two deployment modes (simple/advanced) standardized"
  - version: "1.0.0"
    date: "2025-01-08"
    changes:
      - "Initial release"
      - "Ubuntu 24.04 support"
      - "Core services: Traefik, Dockge, Dozzle, Netdata"
