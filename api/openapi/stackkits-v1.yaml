openapi: "3.1.0"
info:
  title: kombify StackKits API
  version: "1.0.0"
  description: |
    kombify StackKits HTTP API — pre-packaged homelab infrastructure templates
    with CUE schema validation and OpenTofu generation. Designed for consumption
    by the kombify Stack control plane and AI agents via the kombify API Gateway.
  contact:
    name: kombify
    url: https://kombify.io
  license:
    name: MIT

servers:
  - url: http://localhost:8082
    description: Local development
  - url: https://api.kombify.io/stackkits
    description: Production (via Kong)

paths:
  /health:
    get:
      operationId: healthRoot
      summary: Root health check
      tags: [Health]
      responses:
        "200":
          $ref: "#/components/responses/HealthResponse"

  /api/v1/health:
    get:
      operationId: health
      summary: Service health check
      tags: [Health]
      responses:
        "200":
          $ref: "#/components/responses/HealthResponse"

  /api/v1/capabilities:
    get:
      operationId: getCapabilities
      summary: List all API capabilities (AI agent discovery)
      tags: [Discovery]
      responses:
        "200":
          description: List of capabilities
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope"

  /api/v1/openapi.yaml:
    get:
      operationId: getOpenAPISpec
      summary: Get OpenAPI 3.1 specification
      tags: [Discovery]
      responses:
        "200":
          description: YAML OpenAPI spec
          content:
            application/yaml:
              schema:
                type: string

  /api/v1/stackkits:
    get:
      operationId: listStackKits
      summary: List all available StackKits
      tags: [Catalog]
      responses:
        "200":
          description: List of StackKit summaries
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/StackKitSummary"

  /api/v1/stackkits/{name}:
    get:
      operationId: getStackKit
      summary: Get full StackKit details
      tags: [Catalog]
      parameters:
        - $ref: "#/components/parameters/StackKitName"
      responses:
        "200":
          description: Full StackKit configuration
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - properties:
                      data:
                        $ref: "#/components/schemas/StackKit"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/stackkits/{name}/schema:
    get:
      operationId: getStackKitSchema
      summary: Get raw CUE schema for a StackKit
      tags: [Catalog]
      parameters:
        - $ref: "#/components/parameters/StackKitName"
      responses:
        "200":
          description: CUE schema content
          content:
            text/plain:
              schema:
                type: string
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/stackkits/{name}/defaults:
    get:
      operationId: getStackKitDefaults
      summary: Get default StackSpec values for a StackKit
      tags: [Catalog]
      parameters:
        - $ref: "#/components/parameters/StackKitName"
      responses:
        "200":
          description: Default spec values
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - properties:
                      data:
                        $ref: "#/components/schemas/StackSpec"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/validate:
    post:
      operationId: validateSpec
      summary: Validate a stack-spec against its StackKit schema
      tags: [Validation]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StackSpec"
      responses:
        "200":
          description: Validation result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - properties:
                      data:
                        $ref: "#/components/schemas/ValidationResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /api/v1/validate/partial:
    post:
      operationId: validatePartial
      summary: Validate partial spec fields (for wizard step-by-step validation)
      tags: [Validation]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Partial StackSpec fields to validate
      responses:
        "200":
          description: Partial validation result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - properties:
                      data:
                        $ref: "#/components/schemas/ValidationResult"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/generate/tfvars:
    post:
      operationId: generateTFVars
      summary: Generate terraform.tfvars from a validated spec
      tags: [Generation]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateRequest"
      responses:
        "200":
          description: Generated tfvars
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - properties:
                      data:
                        $ref: "#/components/schemas/GenerateResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /api/v1/generate/preview:
    post:
      operationId: generatePreview
      summary: Preview generated infrastructure without writing files
      tags: [Generation]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateRequest"
      responses:
        "200":
          description: Preview of generated output
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - properties:
                      data:
                        $ref: "#/components/schemas/PreviewResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /api/v1/logs:
    get:
      operationId: listLogs
      summary: List all deploy log runs
      description: Returns a paginated list of deploy log runs sorted by timestamp.
      tags: [Logs]
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
          description: Maximum number of results
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
          description: Number of results to skip
      responses:
        "200":
          description: Paginated list of log runs
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - properties:
                      data:
                        $ref: "#/components/schemas/LogRunList"
        "503":
          description: Log directory not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/logs/latest:
    get:
      operationId: getLatestLog
      summary: Get the most recent deploy log
      description: Returns all events from the latest deploy log run.
      tags: [Logs]
      parameters:
        - $ref: "#/components/parameters/LogLevel"
        - $ref: "#/components/parameters/LogPrefix"
      responses:
        "200":
          description: Log events
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - properties:
                      data:
                        $ref: "#/components/schemas/LogRunDetail"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/logs/{runID}:
    get:
      operationId: getLog
      summary: Get deploy log by run ID
      description: |
        Returns events from a specific deploy log run.
        Use query parameters to filter by level or event prefix.
      tags: [Logs]
      parameters:
        - $ref: "#/components/parameters/RunID"
        - $ref: "#/components/parameters/LogLevel"
        - $ref: "#/components/parameters/LogPrefix"
      responses:
        "200":
          description: Log events
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - properties:
                      data:
                        $ref: "#/components/schemas/LogRunDetail"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/logs/{runID}/stream:
    get:
      operationId: streamLog
      summary: Stream live deploy log events (SSE)
      description: |
        Server-Sent Events stream for real-time deploy progress.
        Events are sent as `data:` lines with JSON payloads.
        A final `event: done` is sent when the deploy completes.

        **Client usage:**
        ```javascript
        const es = new EventSource('/api/v1/logs/20260311-104539/stream');
        es.onmessage = (e) => console.log(JSON.parse(e.data));
        es.addEventListener('done', (e) => { es.close(); });
        ```
      tags: [Logs]
      parameters:
        - $ref: "#/components/parameters/RunID"
      responses:
        "200":
          description: SSE event stream
          content:
            text/event-stream:
              schema:
                type: string
                description: Server-Sent Events stream
        "400":
          $ref: "#/components/responses/BadRequest"

  # ── Registry (Direct Connect) ───────────────────────────────────

  /api/v1/registry/instances:
    post:
      operationId: registerInstance
      summary: Register a stackkit-server instance for Direct Connect
      description: |
        Called by stackkit-server after `stackkit apply` to register itself with
        kombify. Kong uses this registry to discover and proxy requests to the
        instance directly.
      tags: [Registry]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InstanceRegistration"
      responses:
        "201":
          description: Instance registered
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - properties:
                      data:
                        $ref: "#/components/schemas/RegistryResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/registry/instances/{instanceId}:
    delete:
      operationId: deregisterInstance
      summary: Remove an instance from the registry
      tags: [Registry]
      parameters:
        - $ref: "#/components/parameters/InstanceId"
      responses:
        "204":
          description: Instance deregistered
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/registry/instances/{instanceId}/heartbeat:
    put:
      operationId: heartbeat
      summary: Send a heartbeat for a registered instance
      description: |
        Sent every 60 seconds by stackkit-server. If no heartbeat is received
        within 3 minutes, Kong marks the instance as unreachable and stops
        routing traffic to it.
      tags: [Registry]
      parameters:
        - $ref: "#/components/parameters/InstanceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [instance_id, status]
              properties:
                instance_id:
                  type: string
                status:
                  type: string
                  enum: [running, degraded, stopped]
      responses:
        "204":
          description: Heartbeat acknowledged
        "404":
          $ref: "#/components/responses/NotFound"

components:
  parameters:
    StackKitName:
      name: name
      in: path
      required: true
      description: StackKit name (e.g., base-kit, ha-kit)
      schema:
        type: string
        pattern: "^[a-z0-9][a-z0-9-]*[a-z0-9]$"

    RunID:
      name: runID
      in: path
      required: true
      description: "Deploy run ID (format: YYYYMMDD-HHMMSS)"
      schema:
        type: string
        pattern: "^\\d{8}-\\d{6}$"
        example: "20260311-104539"

    InstanceId:
      name: instanceId
      in: path
      required: true
      description: Unique instance identifier
      schema:
        type: string
        example: "sh-mylab-abc123-base-kit-def456"

    LogLevel:
      name: level
      in: query
      description: Filter events by log level
      schema:
        type: string
        enum: [INFO, WARN, ERROR, DEBUG]

    LogPrefix:
      name: prefix
      in: query
      description: "Filter events by message prefix (e.g., apply., decision., tofu.)"
      schema:
        type: string
        example: "apply."

  schemas:
    SuccessEnvelope:
      type: object
      required: [data]
      properties:
        data: {}
        meta:
          $ref: "#/components/schemas/ResponseMeta"

    ResponseMeta:
      type: object
      properties:
        request_id:
          type: string
          format: uuid
        timestamp:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: integer
            message:
              type: string
        meta:
          $ref: "#/components/schemas/ResponseMeta"

    StackKitSummary:
      type: object
      properties:
        name:
          type: string
          example: base-kit
        displayName:
          type: string
          example: Base Kit
        description:
          type: string
        version:
          type: string
          example: "1.0.0"
        tags:
          type: array
          items:
            type: string

    StackKit:
      type: object
      properties:
        metadata:
          $ref: "#/components/schemas/StackKitMetadata"
        supportedOS:
          type: array
          items:
            type: string
        requirements:
          $ref: "#/components/schemas/Requirements"
        modes:
          $ref: "#/components/schemas/Modes"
        features:
          $ref: "#/components/schemas/Features"

    StackKitMetadata:
      type: object
      properties:
        apiVersion:
          type: string
        kind:
          type: string
        name:
          type: string
        version:
          type: string
        displayName:
          type: string
        description:
          type: string
        author:
          type: string
        license:
          type: string
        homepage:
          type: string
        repository:
          type: string
        tags:
          type: array
          items:
            type: string

    Requirements:
      type: object
      properties:
        minimum:
          $ref: "#/components/schemas/ResourceSpec"
        recommended:
          $ref: "#/components/schemas/ResourceSpec"

    ResourceSpec:
      type: object
      properties:
        cpu:
          type: integer
        ram:
          type: integer
          description: RAM in GB
        disk:
          type: integer
          description: Disk in GB

    Modes:
      type: object
      properties:
        simple:
          $ref: "#/components/schemas/ModeSpec"
        advanced:
          $ref: "#/components/schemas/ModeSpec"

    ModeSpec:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        engine:
          type: string
          enum: [opentofu, terramate]
        default:
          type: boolean

    Features:
      type: object
      properties:
        multiNode:
          type: boolean
        vpnOverlay:
          type: boolean
        publicAccess:
          type: boolean

    StackSpec:
      type: object
      required: [stackkit]
      properties:
        name:
          type: string
        stackkit:
          type: string
          example: base-kit
        mode:
          type: string
          enum: [simple, advanced]
        domain:
          type: string
        email:
          type: string
          format: email
        network:
          $ref: "#/components/schemas/NetworkSpec"
        compute:
          $ref: "#/components/schemas/ComputeSpec"
        ssh:
          $ref: "#/components/schemas/SSHSpec"
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/NodeSpec"
        services:
          type: object
        environment:
          type: object
          additionalProperties:
            type: string

    NetworkSpec:
      type: object
      properties:
        mode:
          type: string
          enum: [local, public, hybrid]
        subnet:
          type: string
        gateway:
          type: string

    ComputeSpec:
      type: object
      properties:
        tier:
          type: string
          enum: [low, standard, high]

    SSHSpec:
      type: object
      properties:
        keyPath:
          type: string
        user:
          type: string
        port:
          type: integer

    NodeSpec:
      type: object
      properties:
        name:
          type: string
        role:
          type: string
          enum: [control-plane, worker, standalone]
        ip:
          type: string
          format: ipv4
        services:
          type: array
          items:
            type: string

    ValidationResult:
      type: object
      required: [valid]
      properties:
        valid:
          type: boolean
        errors:
          type: array
          items:
            $ref: "#/components/schemas/ValidationError"
        warnings:
          type: array
          items:
            $ref: "#/components/schemas/ValidationError"

    ValidationError:
      type: object
      properties:
        path:
          type: string
        message:
          type: string
        code:
          type: string

    GenerateRequest:
      type: object
      required: [spec]
      properties:
        spec:
          $ref: "#/components/schemas/StackSpec"
        outputDir:
          type: string
          description: Custom output directory (server-side only)

    GenerateResult:
      type: object
      properties:
        tfvars:
          type: object
          description: Generated terraform variable values
        outputDir:
          type: string
        file:
          type: string

    PreviewResult:
      type: object
      properties:
        tfvars:
          type: object
        preview:
          type: boolean
          const: true
        stackkit:
          $ref: "#/components/schemas/StackKitSummary"

    LogRunSummary:
      type: object
      properties:
        run_id:
          type: string
          description: "Unique run identifier (format: YYYYMMDD-HHMMSS)"
          example: "20260311-104539"
        timestamp:
          type: string
          format: date-time
          description: Run start time in RFC3339
        file:
          type: string
          description: Log filename
          example: "20260311-104539.jsonl"

    LogRunList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/LogRunSummary"
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer

    LogRunDetail:
      type: object
      properties:
        run_id:
          type: string
          example: "20260311-104539"
        events:
          type: array
          items:
            $ref: "#/components/schemas/LogEvent"
        total:
          type: integer
          description: Number of events (after filtering)

    LogEvent:
      type: object
      description: |
        A structured deploy log event. Common fields include:
        - `time` (RFC3339Nano timestamp)
        - `level` (INFO, WARN, ERROR, DEBUG)
        - `msg` (event name, e.g. apply.start, tofu.apply, decision.template)
        - `elapsed_ms` (milliseconds since CLI run start)
        Additional fields vary by event type.
      properties:
        time:
          type: string
          format: date-time
        level:
          type: string
          enum: [INFO, WARN, ERROR, DEBUG]
        msg:
          type: string
          description: "Event name (e.g., apply.start, tofu.apply, decision.template)"
        elapsed_ms:
          type: integer
          description: Milliseconds since CLI run started
      additionalProperties: true

    InstanceRegistration:
      type: object
      required: [instance_id, endpoint_url, stackkit, services, status]
      properties:
        instance_id:
          type: string
          description: Unique instance identifier (device fingerprint + stackkit name)
          example: "sh-mylab-abc123-base-kit-def456"
        endpoint_url:
          type: string
          format: uri
          description: Public URL where stackkit-server is reachable
          example: "https://api.sh-mylab-abc123.kombify.me"
        stackkit:
          type: string
          example: "base-kit"
        version:
          type: string
          example: "1.0.0"
        services:
          type: array
          items:
            $ref: "#/components/schemas/ServiceInfo"
        status:
          type: string
          enum: [running, degraded, stopped]
        api_port:
          type: integer
          example: 8082
        last_seen:
          type: string
          format: date-time

    ServiceInfo:
      type: object
      required: [name, status]
      properties:
        name:
          type: string
          example: "traefik"
        url:
          type: string
          format: uri
        status:
          type: string
          enum: [running, stopped, error]

    RegistryResponse:
      type: object
      properties:
        instance_id:
          type: string
        status:
          type: string
        message:
          type: string

    HealthData:
      type: object
      properties:
        status:
          type: string
          enum: [healthy]
        service:
          type: string
        version:
          type: string

  responses:
    HealthResponse:
      description: Service is healthy
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/SuccessEnvelope"
              - properties:
                  data:
                    $ref: "#/components/schemas/HealthData"

    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    UnprocessableEntity:
      description: Validation or generation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

tags:
  - name: Health
    description: Health checks
  - name: Discovery
    description: API capabilities and documentation
  - name: Catalog
    description: StackKit catalog — browse, search, and inspect available templates
  - name: Validation
    description: CUE-based spec validation
  - name: Generation
    description: OpenTofu variable generation from validated specs
  - name: Logs
    description: Deploy log retrieval and live streaming for dashboards and agents
  - name: Registry
    description: Direct Connect instance registry — deployed stackkit-servers register here so Kong can proxy to them
