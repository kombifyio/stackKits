# modern-homelab Default Spec
# Modern Homelab mit Kubernetes (K3s) auf 3 Nodes
# Für CLI-Only Nutzung ohne KombiStack UI
#
# Verwendung:
#   1. Kopiere diese Datei: cp default-spec.yaml my-modern-homelab-spec.yaml
#   2. Passe Werte an (IPs, SSH-User; Domains optional)
#   3. Führe aus: stackkit apply my-modern-homelab-spec.yaml
#
# Version: 1.0
# StackKit: modern-homelab
# Variant: os/ubuntu-24 (Ubuntu 24.04 LTS)
# Network Mode: local-first (Ingress optional; TLS/ACME optional)
# Container Runtime: Kubernetes (K3s) statt Docker

version: "1.0"

stack:
  name: modern-homelab-default
  kit: modern-homelab
  variant: os/ubuntu-24
  addons:
    - monitoring     # Prometheus + Grafana
    - observability  # Loki + Tempo

nodes:
  # Control Plane Node - K3s Server
  - name: k3s-control
    type: main
    provider: local
    ip: 192.168.1.100  # ⚠️ ANPASSEN: Control Plane IP
    ssh:
      host: 192.168.1.100
      port: 22
      user: admin  # ⚠️ ANPASSEN: SSH-User
      key_path: ~/.ssh/id_ed25519
    os:
      type: ubuntu
      version: "24.04"
      arch: amd64
    compute:
      tier: high
      min_ram_gb: 8
      min_cpu_cores: 4
    k3s:
      role: server
      version: "v1.31.4+k3s1"
      options:
        - "--disable=traefik"  # Wir nutzen Ingress-NGINX
        - "--write-kubeconfig-mode=644"
        - "--tls-san=192.168.1.100"  # ⚠️ ANPASSEN: Control Plane IP

  # Worker Node 1
  - name: k3s-worker-1
    type: worker
    provider: local
    ip: 192.168.1.101  # ⚠️ ANPASSEN: Worker 1 IP
    ssh:
      host: 192.168.1.101
      port: 22
      user: admin  # ⚠️ ANPASSEN: SSH-User
      key_path: ~/.ssh/id_ed25519
    os:
      type: ubuntu
      version: "24.04"
      arch: amd64
    compute:
      tier: standard
      min_ram_gb: 4
      min_cpu_cores: 2
    k3s:
      role: agent
      version: "v1.31.4+k3s1"

  # Worker Node 2
  - name: k3s-worker-2
    type: worker
    provider: local
    ip: 192.168.1.102  # ⚠️ ANPASSEN: Worker 2 IP
    ssh:
      host: 192.168.1.102
      port: 22
      user: admin  # ⚠️ ANPASSEN: SSH-User
      key_path: ~/.ssh/id_ed25519
    os:
      type: ubuntu
      version: "24.04"
      arch: amd64
    compute:
      tier: standard
      min_ram_gb: 4
      min_cpu_cores: 2
    k3s:
      role: agent
      version: "v1.31.4+k3s1"

services:
  # Ingress-NGINX - Kubernetes Ingress Controller
  - name: ingress-nginx
    type: ingress
    node: k3s-control  # Deployed via Helm on all nodes
    image: k8s.gcr.io/ingress-nginx/controller:v1.11.1
    ports:
      - 80
      - 443
    labels:
      kombistack.service: ingress-nginx
      kombistack.managed: "true"
      kombistack.type: kubernetes
    k8s:
      namespace: ingress-nginx
      install_method: helm
      chart: ingress-nginx/ingress-nginx
      values:
        controller:
          service:
            type: LoadBalancer
            externalIPs:
              - 192.168.1.100  # ⚠️ ANPASSEN: External IP
          config:
            use-forwarded-headers: "true"
            compute-full-forwarded-for: "true"

  # Cert-Manager - Automatic TLS Certificates (Let's Encrypt)
  - name: cert-manager
    type: security
    node: k3s-control
    image: quay.io/jetstack/cert-manager-controller:v1.16.2
    labels:
      kombistack.service: cert-manager
      kombistack.managed: "true"
      kombistack.type: kubernetes
    k8s:
      namespace: cert-manager
      install_method: helm
      chart: jetstack/cert-manager
      values:
        installCRDs: true
        global:
          leaderElection:
            namespace: cert-manager
    needs:
      - ingress-nginx

  # PostgreSQL Operator - Managed PostgreSQL Clusters
  - name: postgres-operator
    type: database
    node: k3s-control
    image: registry.opensource.zalan.do/acid/postgres-operator:v1.13.0
    labels:
      kombistack.service: postgres-operator
      kombistack.managed: "true"
      kombistack.type: kubernetes
    k8s:
      namespace: postgres-operator
      install_method: helm
      chart: postgres-operator-charts/postgres-operator

  # PostgreSQL Cluster - App Database
  - name: postgres-cluster
    type: database
    node: k3s-worker-1
    image: registry.opensource.zalan.do/acid/spilo-16:3.3-p3
    labels:
      kombistack.service: postgres-cluster
      kombistack.managed: "true"
      kombistack.type: kubernetes
      kombistack.ha.enabled: "true"
    k8s:
      namespace: default
      manifest_type: postgresql
      spec:
        teamId: kombistack
        numberOfInstances: 2  # HA: 2 replicas
        volume:
          size: 10Gi
        postgresql:
          version: "16"
        users:
          kombistack:
            - superuser
            - createdb
        databases:
          kombistack: kombistack
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 1000m
            memory: 2Gi
    needs:
      - postgres-operator

  # Dokploy - App Deployment (als Kubernetes Deployment)
  - name: dokploy
    type: deployment-platform
    node: k3s-worker-1
    image: dokploy/dokploy:latest
    ports:
      - 3000
    env:
      DATABASE_URL: postgresql://kombistack:changeme@postgres-cluster:5432/dokploy  # ⚠️ ANPASSEN!
      # Local-first default: use IP/hostname. Set a real https:// URL only if you enable ingress+TLS.
      NEXTAUTH_URL: http://192.168.1.100:3000  # ⚠️ ANPASSEN: Control Plane/Ingress IP oder DNS Name
      NEXTAUTH_SECRET: changeme_generate_random_secret_32chars  # ⚠️ ANPASSEN!
    labels:
      kombistack.service: dokploy
      kombistack.managed: "true"
      kombistack.type: kubernetes
    k8s:
      namespace: default
      replicas: 2  # HA
      ingress:
        enabled: false
        className: nginx
        # host: dokploy.yourdomain.com  # Optional: echte Domain
        tls:
          enabled: false
          secretName: dokploy-tls
          # issuer: letsencrypt-prod
    needs:
      - postgres-cluster
      - ingress-nginx
      - cert-manager

  # Uptime Kuma - Monitoring
  - name: uptime-kuma
    type: monitoring
    node: k3s-worker-2
    image: louislam/uptime-kuma:1
    ports:
      - 3001
    labels:
      kombistack.service: uptime-kuma
      kombistack.managed: "true"
      kombistack.type: kubernetes
    k8s:
      namespace: default
      replicas: 1
      ingress:
        enabled: false
        className: nginx
        # host: uptime.yourdomain.com  # Optional: echte Domain
        tls:
          enabled: false
          secretName: uptime-kuma-tls
          # issuer: letsencrypt-prod
    needs:
      - ingress-nginx
      - cert-manager

  # Prometheus - Metrics (monitoring addon)
  - name: prometheus
    type: monitoring
    node: k3s-control
    image: prom/prometheus:latest
    labels:
      kombistack.service: prometheus
      kombistack.managed: "true"
      kombistack.addon: monitoring
      kombistack.type: kubernetes
    k8s:
      namespace: monitoring
      install_method: helm
      chart: prometheus-community/kube-prometheus-stack
      values:
        prometheus:
          prometheusSpec:
            retention: 15d
            storageSpec:
              volumeClaimTemplate:
                spec:
                  resources:
                    requests:
                      storage: 50Gi
        grafana:
          enabled: true
          adminPassword: changeme_admin_password  # ⚠️ ANPASSEN!
          ingress:
            enabled: false
            ingressClassName: nginx
            # hosts:
            #   - grafana.yourdomain.com  # Optional: echte Domain
            # tls:
            #   - secretName: grafana-tls
            #     hosts:
            #       - grafana.yourdomain.com
    needs:
      - ingress-nginx
      - cert-manager

  # Loki - Log Aggregation (observability addon)
  - name: loki
    type: observability
    node: k3s-control
    image: grafana/loki:latest
    labels:
      kombistack.service: loki
      kombistack.managed: "true"
      kombistack.addon: observability
      kombistack.type: kubernetes
    k8s:
      namespace: observability
      install_method: helm
      chart: grafana/loki-stack
      values:
        loki:
          persistence:
            enabled: true
            size: 50Gi
        promtail:
          enabled: true
    needs:
      - prometheus

network:
  mode: local
  k8s_service_cidr: 10.43.0.0/16
  k8s_pod_cidr: 10.42.0.0/16
  ingress_ip: 192.168.1.100  # ⚠️ ANPASSEN: External IP für Ingress
  # Optional: DNS provider config for ACME DNS-01
  # dns:
  #   provider: cloudflare
  #   email: admin@yourdomain.com

tls:
  enabled: false
  # provider: letsencrypt
  # email: admin@yourdomain.com
  # staging: false

metadata:
  created_at: "2026-01-10T12:00:00Z"
  description: "Modern homelab with Kubernetes (K3s), Ingress-NGINX, Cert-Manager, and Prometheus Stack"
  unifier_version: "n/a"
  stackkit_version: "1.0.0"
  tags:
    - homelab
    - kubernetes
    - k3s
    - modern
    - public

# Anleitung: Was musst du anpassen?
#
# 1. IP-Adressen (7 Stellen):
#    - nodes[0-2].ip (3x Node IPs)
#    - nodes[0-2].ssh.host (3x gleiche IPs)
#    - nodes[0].k3s.options (TLS SAN)
#    - services[0].k8s.values.controller.service.externalIPs
#    - network.ingress_ip
#
# 2. SSH-Konfiguration (3 Stellen):
#    - nodes[0-2].ssh.user
#    - nodes[0-2].ssh.key_path
#
# 3. Domains (optional):
#    Nur nötig, wenn du Ingress + TLS aktivierst.
#    - services[4].k8s.ingress.host
#    - services[5].k8s.ingress.host
#    - services[6].k8s.values.grafana.ingress.hosts
#    - tls.email / network.dns.email
#
# 4. Secrets (4 Stellen):
#    - services[4].env.DATABASE_URL (PostgreSQL Passwort)
#    - services[4].env.NEXTAUTH_SECRET
#    - services[6].k8s.values.grafana.adminPassword
#    - tls.email (optional ACME Email)
#
#    Generiere mit: openssl rand -hex 32
#
# 5. DNS Provider (2 Stellen):
#    - network.dns.provider (cloudflare, route53, digitalocean, etc.)
#    - network.dns.email
#
# DNS-Setup für Let's Encrypt (optional):
#   1. Registriere Domain bei Cloudflare/etc.
#   2. Erstelle A-Records:
#      - dokploy.yourdomain.com → Ingress IP
#      - uptime.yourdomain.com → Ingress IP
#      - grafana.yourdomain.com → Ingress IP
#   3. API-Token für DNS-01 Challenge erstellen
#   4. Token in Kubernetes Secret speichern
#
# Hardware-Anforderungen:
#   Control Plane: 8GB RAM, 4 CPU Cores
#   Worker Nodes:  4GB RAM, 2 CPU Cores (jeweils)
#   Gesamt:        16GB RAM, 8 CPU Cores
#
# Nach Anpassung:
#   stackkit validate my-modern-homelab-spec.yaml
#   stackkit apply my-modern-homelab-spec.yaml
#
# Kubernetes-Zugriff:
#   export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
#   kubectl get nodes
#   kubectl get pods -A
