# base-kit Stack Specification
#
# Single-server homelab with identity, reverse proxy, PaaS, and monitoring.
#
# Usage:
#   1. Copy: cp default-spec.yaml stack-spec.yaml
#   2. Adjust: IP, SSH user, domain (optional)
#   3. Deploy: stackkit generate && stackkit apply
#
# Architecture:
#   L1 Foundation  - PocketID (OIDC), TinyAuth (ForwardAuth), dnsmasq (local DNS)
#   L2 Platform    - Traefik, Dokploy + PostgreSQL + Redis, Dashboard
#   L3 Application - Uptime Kuma, Whoami (deployed via Compose)
#
# Domain Access Modes:
#   1. Local (default): domain: home.lab → services at *.home.lab via local dnsmasq DNS
#   2. Custom domain:   domain: example.com → services at *.example.com with Let's Encrypt TLS
#   3. kombify.me:      domain: kombify.me → public access via kombify.me subdomains
#
# All services protected by TinyAuth ForwardAuth middleware.

name: my-homelab
stackkit: base-kit
mode: simple
domain: home.lab
email: admin

network:
  mode: local
  subnet: 172.20.0.0/16

compute:
  tier: standard

ssh:
  user: admin
  port: 22
  keyPath: ~/.ssh/id_ed25519

nodes:
  - name: homelab-server
    role: standalone
    ip: 192.168.1.100  # ADJUST: Your server IP

# What to adjust:
#
#   Required:
#     nodes[0].ip      - Your server's IP address
#     ssh.user         - Your SSH username (e.g. "admin", "ubuntu")
#     ssh.keyPath      - Path to your SSH private key
#
#   Optional:
#     domain           - Access mode (see above). Default: homelab (local DNS)
#     email            - Admin email / ACME email for Let's Encrypt
#
# Local mode DNS setup:
#   A dnsmasq DNS server is deployed automatically.
#   Set your router's DHCP DNS to your server IP (e.g. 192.168.1.100)
#   so all devices on your network can reach services by name.
#
#   Alternatively, on each device set DNS to your server IP.
#
# First login:
#   1. Open http://auth.home.lab → TinyAuth
#      Username: admin  |  Password: <auto-generated, see output>
#   2. Open http://dokploy.home.lab (redirects through TinyAuth)
#   3. Uptime Kuma and Whoami are auto-deployed
#
# Custom domain example:
#   domain: mylab.example.com
#   email: admin@example.com
#   tls:
#     provider: cloudflare   # For DNS-01 ACME challenge
#     challenge: dns
#   # Set STACKKIT_DNS_TOKEN env var with your Cloudflare API token
#
# Secrets:
#   Generated automatically by OpenTofu (random_password).
#   No manual secret setup required.
