name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  GO_VERSION: "1.24"

jobs:
  lint:
    name: Lint
    runs-on: ${{ vars.CI_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run go vet
        run: go vet ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          args: --timeout=5m

  security:
    name: Security Scan
    runs-on: ${{ vars.CI_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run govulncheck
        continue-on-error: true
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Run gosec
        uses: securego/gosec@master
        with:
          args: -exclude=G101,G104,G106,G115,G204,G301,G304,G306,G703,G705,G706 -exclude-generated ./...

  test:
    name: Test
    runs-on: ${{ vars.CI_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Run tests with coverage
        run: |
          go test -v -race -coverprofile=coverage.out -covermode=atomic ./...
          go tool cover -func=coverage.out

      - name: Check coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${COVERAGE}%"
          THRESHOLD=35
          if [ "$(echo "$COVERAGE < $THRESHOLD" | bc -l)" -eq 1 ]; then
            echo "Coverage ${COVERAGE}% is below threshold ${THRESHOLD}%"
            exit 1
          fi

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 30

  cue-validation:
    name: CUE Validation
    runs-on: ${{ vars.CI_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install CUE
        run: |
          CUE_VERSION=$(grep 'cuelang.org/go ' go.mod | awk '{print $2}')
          go install cuelang.org/go/cmd/cue@${CUE_VERSION}
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Validate base schemas
        run: cue vet ./base/...

      - name: Validate base-kit
        run: cue vet ./base-kit/...

      - name: Validate modern-homelab
        run: cue vet ./modern-homelab/...

      - name: Validate modules
        run: |
          for dir in modules/*/; do
            if [ -f "$dir/module.cue" ]; then
              echo "Validating $dir..."
              cue vet -c=false "./$dir/..."
            fi
          done

  module-tests:
    name: Module Test (${{ matrix.module }})
    runs-on: ${{ vars.CI_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 20
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        module: [traefik, tinyauth, pocketid, dokploy, uptime-kuma, dozzle, whoami, dashboard, socket-proxy, crowdsec, lldap, step-ca, adguard-home, unbound]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run module integration test
        run: |
          SCRIPT="modules/${{ matrix.module }}/tests/integration_test.sh"
          if [ -f "$SCRIPT" ]; then
            chmod +x "$SCRIPT"
            bash "$SCRIPT"
          else
            echo "SKIP: $SCRIPT not found yet"
          fi

  composition-test:
    name: Full Stack Composition
    runs-on: ${{ vars.CI_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 30
    continue-on-error: true
    needs: [module-tests, cue-validation]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run composition test
        run: |
          SCRIPT="modules/_integration/integration_test.sh"
          if [ -f "$SCRIPT" ]; then
            chmod +x "$SCRIPT"
            bash "$SCRIPT"
          else
            echo "SKIP: Composition test not yet created"
          fi

  build:
    name: Build
    runs-on: ${{ vars.CI_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 30
    needs: [lint, test, security, cue-validation]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Build binary
        run: |
          CGO_ENABLED=0 go build -ldflags="-s -w" -o stackkit ./cmd/stackkit
          ./stackkit --version || echo "Binary built successfully"

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: stackkit-linux-amd64
          path: stackkit
          retention-days: 7

  # Optional: Build for multiple platforms
  build-matrix:
    name: Build (${{ matrix.os }}/${{ matrix.arch }})
    runs-on: ${{ vars.CI_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 30
    needs: [lint, test, security, cue-validation]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: windows
            arch: amd64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"
        run: |
          BINARY_NAME="stackkit-${{ matrix.os }}-${{ matrix.arch }}"
          if [ "${{ matrix.os }}" = "windows" ]; then
            BINARY_NAME="${BINARY_NAME}.exe"
          fi
          go build -ldflags="-s -w" -o "${BINARY_NAME}" ./cmd/stackkit

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: stackkit-${{ matrix.os }}-${{ matrix.arch }}
          path: stackkit-*
          retention-days: 7

  # Final status check for branch protection
  # Module tests and composition tests are Docker-dependent integration tests
  # that run best-effort (continue-on-error). Core CI gates on lint, test,
  # security, and CUE validation only.
  ci-passed:
    name: CI Passed
    needs: [lint, test, security, cue-validation]
    runs-on: ${{ vars.CI_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 5
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.security.result }}" != "success" ] || \
             [ "${{ needs.cue-validation.result }}" != "success" ]; then
            echo "Some jobs failed"
            exit 1
          fi
          echo "All CI jobs passed"
