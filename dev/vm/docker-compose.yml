services:
  vm-ubuntu:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stackkits-vm-ubuntu
    privileged: true
    environment:
      DOCKER_TLS_CERTDIR: ""
    ports:
      - "2222:22"       # SSH
      - "2375:2375"     # Docker API
      - "80:80"         # Traefik HTTP
      - "443:443"       # Traefik HTTPS
      - "8080:8080"     # Traefik dashboard
    volumes:
      - vm_docker:/var/lib/docker
      - ./authorized_keys:/authorized_keys:ro

volumes:
  vm_docker:
