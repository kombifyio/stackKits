# Whoami Reference Compose
# Purpose: Isolated testing of Whoami HTTP echo service with Traefik
# Usage:
#   docker compose -f modules/whoami/tests/reference-compose.yml up -d
#   Add to /etc/hosts: 127.0.0.1 whoami.test.local
#   Browser: http://whoami.test.local:8895 (Whoami echo)
#
# NOTE: traefik/whoami is scratch-based -- NO shell, NO wget, NO curl inside.
# Do NOT add a healthcheck that uses shell tools. Test from outside only.

services:
  traefik:
    image: traefik:v3.3
    container_name: test-traefik-whoami
    command:
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
    ports:
      - "8895:80"
      - "19095:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "traefik", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - test-net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

  whoami:
    image: traefik/whoami:latest
    container_name: test-whoami-module
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.whoami.rule=Host(`whoami.test.local`)"
      - "traefik.http.routers.whoami.entrypoints=web"
      - "traefik.http.services.whoami.loadbalancer.server.port=80"
    networks:
      - test-net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    mem_limit: 32m
    cpus: 0.1

networks:
  test-net:
    driver: bridge
