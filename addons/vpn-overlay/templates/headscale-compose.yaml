# =============================================================================
# Headscale Server - VPN Overlay Add-On
# =============================================================================
# Self-hosted coordination server for Tailscale clients.
# Use this when you want full control over your VPN mesh.
#
# Prerequisites:
#   - Domain pointing to server: hs.${domain}
#   - TLS certificate (handled by Traefik)
#   - PostgreSQL database (optional, defaults to SQLite)
#
# Generated by: kombify stack generate --include-addons
# =============================================================================

services:
  headscale:
    image: headscale/headscale:${HEADSCALE_VERSION:-v0.23.0}
    container_name: headscale
    restart: unless-stopped
    command: serve
    
    environment:
      - TZ=${TZ:-UTC}
    
    volumes:
      - headscale_data:/var/lib/headscale
      - headscale_config:/etc/headscale
      - ./headscale/config.yaml:/etc/headscale/config.yaml:ro
    
    ports:
      # Note: In production, these should go through Traefik
      # Exposed here for development/testing
      - "${HEADSCALE_PORT:-8443}:443"
      - "${HEADSCALE_GRPC_PORT:-50443}:50443"
      - "${HEADSCALE_METRICS_PORT:-9091}:9090"
      - "3478:3478/udp"
    
    networks:
      - proxy
      - internal
    
    healthcheck:
      test: ["CMD", "headscale", "health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    
    labels:
      # Traefik routing
      - "traefik.enable=true"
      - "traefik.http.routers.headscale.rule=Host(`hs.${DOMAIN}`)"
      - "traefik.http.routers.headscale.entrypoints=https"
      - "traefik.http.routers.headscale.tls=true"
      - "traefik.http.routers.headscale.tls.certresolver=${CERT_RESOLVER:-letsencrypt}"
      - "traefik.http.services.headscale.loadbalancer.server.port=443"
      - "traefik.http.services.headscale.loadbalancer.server.scheme=https"
      
      # GRPC routing (for control protocol)
      - "traefik.http.routers.headscale-grpc.rule=Host(`hs.${DOMAIN}`) && PathPrefix(`/headscale.v1`)"
      - "traefik.http.routers.headscale-grpc.entrypoints=https"
      - "traefik.http.routers.headscale-grpc.service=headscale-grpc"
      - "traefik.http.services.headscale-grpc.loadbalancer.server.port=50443"
      - "traefik.http.services.headscale-grpc.loadbalancer.server.scheme=h2c"
      
      # Homepage integration
      - "homepage.group=Network"
      - "homepage.name=Headscale"
      - "homepage.icon=headscale.png"
      - "homepage.href=https://hs.${DOMAIN}"
      - "homepage.description=VPN Coordination Server"

  # Optional: Headscale Web UI
  headscale-ui:
    image: ghcr.io/gurucomputing/headscale-ui:latest
    container_name: headscale-ui
    restart: unless-stopped
    profiles:
      - ui  # Only start with --profile ui
    
    networks:
      - proxy
    
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.headscale-ui.rule=Host(`hs-ui.${DOMAIN}`)"
      - "traefik.http.routers.headscale-ui.entrypoints=https"
      - "traefik.http.routers.headscale-ui.tls=true"
      - "traefik.http.services.headscale-ui.loadbalancer.server.port=80"

volumes:
  headscale_data:
    name: headscale_data
  headscale_config:
    name: headscale_config

networks:
  proxy:
    external: true
  internal:
    name: headscale_internal
