name: base-homelab
version: "2.0"
audience: single-server

layers:
  foundation: base
  platform: docker

services:
  network:
    - traefik
  platform:
    coolify: hasDomain
    dokploy: noDomain
  monitoring:
    uptime-kuma: default
    beszel: alternative
  utilities:
    - dozzle
    - whoami

variants:
  coolify: hasDomain
  dokploy: noDomain or localDomain
  beszel: userChoice

acceptance:
  - services start
  - UIs accessible
  - can deploy app
  - destroy cleans up
