# GoReleaser configuration for StackKits CLI
# See: https://goreleaser.com/customization/

version: 2
project_name: stackkits

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: stackkit
    main: ./cmd/stackkit
    binary: stackkit
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.Version={{ .Version }}
      - -X main.GitCommit={{ .Commit }}
      - -X main.BuildDate={{ .Date }}

archives:
  # Full bundle — all kits + CLI (for users who want everything)
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - LICENSE
      - docs/CLI.md
      - base-kit/**
      - base/**
      - ha-kit/**
      - modern-homelab/**

  # Per-kit archives — CLI + specific kit + base schemas
  - id: base-kit
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}-base-kit_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - LICENSE
      - docs/CLI.md
      - base-kit/**
      - base/**

  # TODO: add ha-kit and modern-homelab per-kit archives when they graduate from alpha
  # - id: ha-kit
  # - id: modern-homelab

nfpms:
  - id: deb
    package_name: kombify-stackkits
    vendor: kombify
    homepage: https://github.com/KombiverseLabs/kombify-StackKits
    maintainer: kombify <admin@kombify.io>
    description: "kombify StackKits CLI — infrastructure deployment from declarative blueprints"
    license: "Apache-2.0 AND GPL-3.0"
    formats:
      - deb
    bindir: /usr/local/bin
    section: utils
    priority: optional

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - "^style:"
      - Merge pull request
      - Merge branch
  groups:
    - title: "Breaking Changes"
      regexp: '^.*?!:.+$'
      order: 0
    - title: "Features"
      regexp: '^.*?feat(\(.+\))?:.+$'
      order: 1
    - title: "Bug Fixes"
      regexp: '^.*?fix(\(.+\))?:.+$'
      order: 2
    - title: "Other"
      order: 999

release:
  github:
    owner: kombifyio
    name: stackKits
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"
  header: |
    ## StackKits CLI v{{ .Version }}

    ### Quick Install

    **Base Kit (single-server homelab):**
    ```bash
    curl -sSL base.stackkit.cc | sh
    ```

    **CLI only (pick a kit later):**
    ```bash
    curl -sSL install.kombify.me | sh
    ```

    ### Downloads

    | Archive | Contents |
    |---------|----------|
    | `stackkits_*` | Full bundle — CLI + all kits |
    | `stackkits-base-kit_*` | CLI + base-kit only |
  footer: |
    **Full Changelog**: https://github.com/kombifyio/stackKits/compare/{{ .PreviousTag }}...{{ .Tag }}
