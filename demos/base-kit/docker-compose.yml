# =============================================================================
# Base Kit Demo — All 9 services in one compose (self-contained)
# =============================================================================
#
# Usage:
#   docker compose -f demos/base-kit/docker-compose.yml up -d
#
# Ports:
#   7880  — HTTP (Traefik entrypoint)
#   7090  — Traefik Dashboard/API
#
# Credentials:
#   TinyAuth: admin / admin123
#   Dokploy: First-run setup via UI
#
# Domains (kombify.me → auto-resolves to 127.0.0.1, no /etc/hosts needed):
#   auth.kombify.me:7880       — TinyAuth login
#   id.kombify.me:7880         — PocketID (OIDC)
#   dokploy.kombify.me:7880    — Dokploy PaaS
#   dash.kombify.me:7880       — Dashboard
#   kuma.kombify.me:7880       — Uptime Kuma
#   whoami.kombify.me:7880     — Network diagnostic
#   proxy.kombify.me:7880      — Traefik dashboard
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Layer 2: Traefik — Reverse Proxy (inline dynamic config, no bind mounts)
  # ---------------------------------------------------------------------------
  traefik:
    image: traefik:v3.3
    container_name: demo-traefik
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mkdir -p /etc/traefik
        cat > /etc/traefik/dynamic.yml << 'DYNAMIC'
        http:
          routers:
            tinyauth:
              rule: "Host(`auth.kombify.me`)"
              entryPoints: [web]
              service: tinyauth
            pocketid:
              rule: "Host(`id.kombify.me`)"
              entryPoints: [web]
              service: pocketid
            dokploy:
              rule: "Host(`dokploy.kombify.me`)"
              entryPoints: [web]
              service: dokploy
              middlewares: [tinyauth-forward]
            dashboard:
              rule: "Host(`dash.kombify.me`)"
              entryPoints: [web]
              service: dashboard
              middlewares: [tinyauth-forward]
            kuma:
              rule: "Host(`kuma.kombify.me`)"
              entryPoints: [web]
              service: kuma
              middlewares: [tinyauth-forward]
            whoami:
              rule: "Host(`whoami.kombify.me`)"
              entryPoints: [web]
              service: whoami
              middlewares: [tinyauth-forward]
            traefik-dashboard:
              rule: "Host(`proxy.kombify.me`)"
              entryPoints: [web]
              service: traefik-api
              middlewares: [tinyauth-forward]
          services:
            tinyauth:
              loadBalancer:
                servers:
                  - url: "http://tinyauth:3000"
            pocketid:
              loadBalancer:
                servers:
                  - url: "http://pocketid:1411"
            dokploy:
              loadBalancer:
                servers:
                  - url: "http://dokploy:3000"
            dashboard:
              loadBalancer:
                servers:
                  - url: "http://dashboard:80"
            kuma:
              loadBalancer:
                servers:
                  - url: "http://kuma:3001"
            whoami:
              loadBalancer:
                servers:
                  - url: "http://whoami:80"
            traefik-api:
              loadBalancer:
                servers:
                  - url: "http://traefik:8080"
          middlewares:
            tinyauth-forward:
              forwardAuth:
                address: "http://tinyauth:3000/api/auth/traefik"
                trustForwardHeader: true
                authResponseHeaders:
                  - remote-user
                  - remote-sub
                  - remote-name
                  - remote-email
                  - remote-groups
        DYNAMIC
        exec traefik \
          --api.insecure=true \
          --ping=true \
          --entrypoints.web.address=:80 \
          --providers.file.filename=/etc/traefik/dynamic.yml \
          --providers.file.watch=true \
          --log.level=ERROR
    ports:
      - "7880:80"
      - "7090:8080"
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - base_net

  # ---------------------------------------------------------------------------
  # Layer 2: TinyAuth — ForwardAuth (requires: traefik)
  # ---------------------------------------------------------------------------
  tinyauth:
    image: ghcr.io/steveiliop56/tinyauth:v4
    container_name: demo-tinyauth
    restart: unless-stopped
    environment:
      - TZ=Europe/Berlin
      - APP_URL=http://auth.kombify.me:7880
      - "USERS=admin:$$2b$$12$$Osp9VbUj1xvhgmOeVlB/rOuayl4w0DvseE8W0O.J1m6WdVLV8EQbO"
      - SECURE_COOKIE=false
      - SESSION_EXPIRY=86400
    volumes:
      - tinyauth-data:/data
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "tinyauth", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      traefik:
        condition: service_healthy
    networks:
      - base_net

  # ---------------------------------------------------------------------------
  # Layer 2: PocketID — OIDC Provider (requires: traefik)
  # ---------------------------------------------------------------------------
  pocketid:
    image: ghcr.io/pocket-id/pocket-id:v2
    container_name: demo-pocketid
    restart: unless-stopped
    environment:
      - TZ=Europe/Berlin
      - APP_URL=http://id.kombify.me:7880
      - TRUST_PROXY=true
      - PORT=1411
      - ENCRYPTION_KEY=demo-base-kit-encryption-key-2026
    volumes:
      - pocketid-data:/app/data
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "/app/pocket-id", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    depends_on:
      traefik:
        condition: service_healthy
    networks:
      - base_net

  # ---------------------------------------------------------------------------
  # Layer 2: Dokploy PostgreSQL (internal, isolated network)
  # ---------------------------------------------------------------------------
  dokploy-postgres:
    image: postgres:16-alpine
    container_name: demo-dokploy-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=dokploy
      - POSTGRES_PASSWORD=demo-dokploy-pass-2024
      - POSTGRES_DB=dokploy
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - dokploy-postgres-data:/var/lib/postgresql/data
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dokploy -d dokploy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal_db

  # ---------------------------------------------------------------------------
  # Layer 2: Dokploy Redis (internal, isolated network)
  # ---------------------------------------------------------------------------
  dokploy-redis:
    image: redis:7-alpine
    container_name: demo-dokploy-redis
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - internal_db

  # ---------------------------------------------------------------------------
  # Layer 2: Dokploy — PaaS Platform (requires: traefik, postgres, redis)
  # ---------------------------------------------------------------------------
  dokploy:
    image: dokploy/dokploy:latest
    container_name: demo-dokploy
    restart: unless-stopped
    user: "0:0"
    environment:
      - DATABASE_URL=postgresql://dokploy:demo-dokploy-pass-2024@dokploy-postgres:5432/dokploy
      - REDIS_URL=redis://dokploy-redis:6379
      - NODE_ENV=production
      - PORT=3000
      - TRPC_PLAYGROUND=false
    volumes:
      - dokploy-data:/etc/dokploy
      - /var/run/docker.sock:/var/run/docker.sock
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      dokploy-postgres:
        condition: service_healthy
      dokploy-redis:
        condition: service_healthy
      traefik:
        condition: service_healthy
    networks:
      - base_net
      - internal_db

  # ---------------------------------------------------------------------------
  # Layer 3: Dashboard — Service Links Hub (requires: traefik)
  # ---------------------------------------------------------------------------
  dashboard:
    image: nginx:alpine
    container_name: demo-dashboard
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        cat > /usr/share/nginx/html/index.html << 'DASHBOARD'
        <!DOCTYPE html>
        <html><head><meta charset="utf-8"><title>kombify Base Kit</title>
        <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:system-ui,-apple-system,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center}
        .container{max-width:800px;width:100%;padding:2rem}
        h1{font-size:2rem;margin-bottom:.5rem;background:linear-gradient(135deg,#3b82f6,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .subtitle{color:#94a3b8;margin-bottom:2rem}
        .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1rem}
        .card{background:#1e293b;border:1px solid #334155;border-radius:.75rem;padding:1.25rem;text-decoration:none;color:#e2e8f0;transition:all .2s}
        .card:hover{border-color:#3b82f6;transform:translateY(-2px);box-shadow:0 4px 12px rgba(59,130,246,.2)}
        .card h3{font-size:1rem;margin-bottom:.25rem}
        .card p{font-size:.8rem;color:#94a3b8}
        .badge{display:inline-block;font-size:.65rem;padding:.15rem .4rem;border-radius:.25rem;margin-bottom:.5rem}
        .l2{background:#1e3a5f;color:#60a5fa}
        .l3{background:#1e3a2f;color:#4ade80}
        .auth{background:#3b1e5f;color:#c084fc}
        footer{text-align:center;margin-top:2rem;color:#475569;font-size:.75rem}
        </style></head><body>
        <div class="container">
        <h1>kombify Base Kit</h1>
        <p class="subtitle">Single-node homelab — all services running</p>
        <div class="grid">
        <a class="card" href="http://auth.kombify.me:7880"><span class="badge auth">Auth</span><h3>TinyAuth</h3><p>Login &amp; ForwardAuth</p></a>
        <a class="card" href="http://id.kombify.me:7880"><span class="badge auth">Auth</span><h3>PocketID</h3><p>OIDC Provider</p></a>
        <a class="card" href="http://dokploy.kombify.me:7880"><span class="badge l2">Platform</span><h3>Dokploy</h3><p>PaaS Management</p></a>
        <a class="card" href="http://proxy.kombify.me:7880"><span class="badge l2">Platform</span><h3>Traefik</h3><p>Reverse Proxy Dashboard</p></a>
        <a class="card" href="http://kuma.kombify.me:7880"><span class="badge l3">App</span><h3>Uptime Kuma</h3><p>Service Monitoring</p></a>
        <a class="card" href="http://whoami.kombify.me:7880"><span class="badge l3">App</span><h3>Whoami</h3><p>Network Diagnostic</p></a>
        </div>
        <footer>kombify StackKits &mdash; Base Kit Demo</footer>
        </div></body></html>
        DASHBOARD
        nginx -g "daemon off;"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    depends_on:
      traefik:
        condition: service_healthy
    networks:
      - base_net

  # ---------------------------------------------------------------------------
  # Layer 3: Uptime Kuma — Monitoring (requires: traefik)
  # ---------------------------------------------------------------------------
  kuma:
    image: louislam/uptime-kuma:1
    container_name: demo-kuma
    restart: unless-stopped
    volumes:
      - kuma-data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const http=require('http');const o={hostname:'localhost',port:3001,path:'/api/status-page/heartbeat/demo',timeout:2000};const r=http.request(o,res=>{process.exit(res.statusCode===200?0:1)});r.on('error',()=>process.exit(1));r.end()\"||exit 0"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      traefik:
        condition: service_healthy
    networks:
      - base_net

  # ---------------------------------------------------------------------------
  # Layer 3: Whoami — Network Diagnostic (requires: traefik)
  # ---------------------------------------------------------------------------
  whoami:
    image: traefik/whoami:latest
    container_name: demo-whoami
    restart: unless-stopped
    networks:
      - base_net

# =============================================================================
# Networks
# =============================================================================
networks:
  base_net:
    name: demo_base_net
  internal_db:
    name: demo_internal_db
    internal: true

# =============================================================================
# Volumes
# =============================================================================
volumes:
  tinyauth-data:
  pocketid-data:
  dokploy-data:
  dokploy-postgres-data:
  kuma-data:
