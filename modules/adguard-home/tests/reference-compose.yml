# AdGuard Home Reference Compose
# Purpose: Isolated testing of AdGuard Home DNS filter with Traefik
# Architecture:
#   traefik → adguard-home (web UI on 3000, DNS on 53)
#
# Usage:
#   docker compose -f modules/adguard-home/tests/reference-compose.yml up -d --wait
#   ./modules/adguard-home/tests/integration_test.sh

services:
  traefik:
    image: traefik:v3.3
    container_name: test-traefik-adguard
    command:
      - "--api.insecure=true"
      - "--ping=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "8899:80"
      - "19099:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "traefik", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - test-net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

  adguard-home:
    image: adguard/adguardhome:latest
    container_name: test-adguard-home
    volumes:
      - adguard-work:/opt/adguardhome/work
      - adguard-conf:/opt/adguardhome/conf
    ports:
      - "15354:53/udp"
      - "15354:53/tcp"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.adguard-home.rule=Host(`adguard.test.local`)"
      - "traefik.http.routers.adguard-home.entrypoints=web"
      - "traefik.http.services.adguard-home.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s
    networks:
      - test-net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    mem_limit: 256m
    cpus: 0.25

  adguard-provisioner:
    image: alpine/curl:latest
    container_name: test-adguard-provisioner
    depends_on:
      adguard-home:
        condition: service_healthy
    command:
      - sh
      - -c
      - |
        echo "Provisioning AdGuard Home..."
        result=$$(curl -s -w "\n%{http_code}" -X POST http://adguard-home:3000/control/install/configure \
          -H "Content-Type: application/json" \
          -d '{"web":{"ip":"0.0.0.0","port":3000,"status":"","can_autofix":false},"dns":{"ip":"0.0.0.0","port":53,"status":"","can_autofix":false},"username":"admin","password":"Admin1234!"}')
        code=$$(echo "$$result" | tail -1)
        if [ "$$code" = "200" ]; then
          echo "AdGuard Home: configured (admin / Admin1234!)"
        else
          echo "AdGuard Home: response $$code (may already be configured)"
        fi
    networks:
      - test-net
    restart: "no"

networks:
  test-net:
    driver: bridge

volumes:
  adguard-work:
  adguard-conf:
