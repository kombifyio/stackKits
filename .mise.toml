# kombify StackKits — CUE-based infrastructure toolkit
# Commands: mise run dev | mise run stage | mise run prod

min_version = "2024.11.1"

[tools]
go = "1.24.1"
node = "22"
"ubi:cue-lang/cue" = "latest"

[env]
PROJECT_NAME = "kombify-stackkits"
GOTOOLCHAIN = "auto"
_.file = [".env", ".env.local"]

# ── Internal Tasks ─────────────────────────────────────────────

[tasks._docker-check]
description = "Verify Docker Desktop is running"
run = 'docker info > /dev/null 2>&1 || (echo "ERROR: Docker Desktop is not running!" && exit 1)'

[tasks._build]
description = "Build CLI binary"
depends = ["_docker-check"]
run = [
  "go mod download",
  "go build -o build/stackkit ./cmd/stackkit",
]

[tasks._docker-up]
description = "Start services via Docker Compose"
depends = ["_build"]
run = "docker compose up -d --build --remove-orphans"

[tasks._health]
description = "Wait for services"
depends = ["_docker-up"]
run = "sleep 5"

[tasks._test]
description = "Run unit + integration + CUE validation tests"
depends = ["_health"]
run = [
  "go test -v -race -short ./pkg/... ./internal/...",
  "go test -v -race ./tests/integration/...",
  "cue vet ./base/...",
  "cue vet ./base-homelab/...",
  "cue vet ./dev-homelab/...",
  "cue vet ./modern-homelab/...",
]

# ── Public Tasks (only these 3) ───────────────────────────────

[tasks.dev]
description = "Build, start in Docker, run all tests"
depends = ["_test"]
run = '''
echo ""
echo "kombify StackKits ready!"
echo "CLI: build/stackkit"
'''

[tasks.stage]
description = "Deploy to staging (trigger release workflow)"
depends = ["_test"]
run = "gh workflow run release.yml"

[tasks.prod]
description = "Deploy to production (trigger release workflow)"
depends = ["_test"]
run = "gh workflow run release.yml -f environment=production"
