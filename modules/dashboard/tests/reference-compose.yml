# Dashboard Reference Compose
# Purpose: Isolated testing of the service dashboard with Traefik
# Usage:
#   docker compose -f modules/dashboard/tests/reference-compose.yml up -d
#   Add to /etc/hosts: 127.0.0.1 dash.test.local
#   Browser: http://dash.test.local:8896 (Dashboard)

services:
  traefik:
    image: traefik:v3.3
    container_name: test-traefik-dashboard
    command:
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
    ports:
      - "8896:80"
      - "19096:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "traefik", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - test-net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

  dashboard:
    image: nginx:alpine
    container_name: test-dashboard
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo '<html><head><title>Homelab Dashboard</title></head><body><h1>My Homelab</h1><p>Service dashboard</p></body></html>' > /usr/share/nginx/html/index.html
        nginx -g "daemon off;"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`dash.test.local`)"
      - "traefik.http.routers.dashboard.entrypoints=web"
      - "traefik.http.services.dashboard.loadbalancer.server.port=80"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:80/"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - test-net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /run
    mem_limit: 32m
    cpus: 0.1

networks:
  test-net:
    driver: bridge
