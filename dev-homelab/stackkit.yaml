# Dev Homelab StackKit
# ====================
# Purpose: Minimal MVP for e2e testing of the CLI and integration tools
# Status: Internal development only - NOT FOR PUBLICATION
#
# This is a simplified version of base-homelab designed to test:
# - CLI commands (init, validate, plan, apply, destroy, status)
# - Integration with Kombify Administration
# - Pipeline and automation workflows
# - Contract validation process

apiVersion: "v1"
kind: "StackKit"
metadata:
  name: "dev-homelab"
  version: "1.0.0"
  displayName: "Dev Homelab"
  description: "Minimal development StackKit for testing tooling integration"
  author: "StackKits Development Team"
  license: "MIT"
  repository: "internal"

# Minimal requirements for testing
supportedOS:
  - ubuntu-24.04

requirements:
  minimum:
    cpu: 2
    ram: 4
    disk: 20
  recommended:
    cpu: 2
    ram: 4
    disk: 20

# Simple mode only - no advanced features
modes:
  simple:
    name: "Simple"
    description: "Single Docker host with minimal services"
    default: true
    engine: "opentofu"

# Single variant - minimal configuration
variants:
  default:
    displayName: "Default"
    description: "Default dev-homelab configuration"
    services:
      - whoami

# Testing lifecycle hooks
hooks:
  preApply: []
  postApply:
    - "docker ps"
  preDestroy: []
  postDestroy:
    - "docker ps -a"
