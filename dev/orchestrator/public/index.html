<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>kombify StackKits — Orchestrator</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--bg:#0f172a;--surface:#1e293b;--border:#334155;--text:#e2e8f0;--muted:#94a3b8;--dim:#64748b;--accent:#3b82f6;--green:#22c55e;--red:#ef4444;--amber:#f59e0b}
    body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}

    /* Header */
    header{background:var(--surface);border-bottom:1px solid var(--border);padding:.6rem 1.2rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
    header h1{font-size:1.05rem;background:linear-gradient(135deg,#3b82f6,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:700}
    .header-status{font-size:.72rem;color:var(--muted);display:flex;align-items:center;gap:.5rem}
    .dot{width:7px;height:7px;border-radius:50%;display:inline-block}
    .dot-green{background:var(--green)}
    .dot-red{background:var(--red)}
    .dot-amber{background:var(--amber)}
    .dot-gray{background:var(--dim)}

    /* Main layout */
    .main{flex:1;display:flex;overflow:hidden}

    /* Sidebar */
    .sidebar{width:300px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
    .sidebar-header{padding:.75rem 1rem;border-bottom:1px solid var(--border);font-size:.75rem;color:var(--dim);text-transform:uppercase;letter-spacing:.08em;font-weight:600}
    .sidebar-content{flex:1;overflow-y:auto;padding:.75rem}

    /* Demo cards */
    .demo-card{background:var(--bg);border:1px solid var(--border);border-radius:.5rem;padding:.75rem;margin-bottom:.75rem;transition:border-color .2s}
    .demo-card.running{border-color:var(--green)}
    .demo-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem}
    .demo-card-title{font-size:.82rem;font-weight:600;display:flex;align-items:center;gap:.4rem}
    .demo-port{font-size:.65rem;color:var(--dim);font-weight:400}
    .demo-actions{display:flex;gap:.35rem;margin-bottom:.5rem}
    .btn{padding:.3rem .65rem;border:none;border-radius:.25rem;cursor:pointer;font-size:.7rem;font-weight:500;transition:all .15s}
    .btn-start{background:#166534;color:#bbf7d0}
    .btn-start:hover:not(:disabled){background:#15803d}
    .btn-stop{background:#7f1d1d;color:#fecaca}
    .btn-stop:hover:not(:disabled){background:#991b1b}
    .btn-test{background:#1e3a5f;color:#93c5fd}
    .btn-test:hover:not(:disabled){background:#1e40af}
    .btn:disabled{opacity:.4;cursor:not-allowed}
    .btn-loading{position:relative;color:transparent!important}
    .btn-loading::after{content:"";position:absolute;inset:0;margin:auto;width:12px;height:12px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .container-list{margin-top:.35rem}
    .container-item{font-size:.65rem;color:var(--muted);padding:.15rem 0;display:flex;align-items:center;gap:.3rem}

    /* Portal section */
    .portal-section{margin-top:auto;border-top:1px solid var(--border);padding:.75rem}
    .portal-title{font-size:.7rem;color:var(--dim);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.5rem;font-weight:600}
    .portal-link{display:block;font-size:.72rem;color:var(--accent);text-decoration:none;padding:.2rem 0;transition:color .15s}
    .portal-link:hover{color:#60a5fa}

    /* Terminal */
    .terminal-area{flex:1;display:flex;flex-direction:column;min-width:0}
    .terminal-header{background:var(--surface);border-bottom:1px solid var(--border);padding:.45rem .85rem;font-size:.72rem;color:var(--muted);display:flex;align-items:center;gap:.5rem;flex-shrink:0}
    #terminal-container{flex:1;background:#000;padding:4px;overflow:hidden}

    /* Status bar */
    .statusbar{background:var(--surface);border-top:1px solid var(--border);padding:.3rem 1rem;font-size:.65rem;color:var(--dim);display:flex;justify-content:space-between;flex-shrink:0}

    /* Log overlay */
    .log-overlay{display:none;position:fixed;bottom:40px;right:16px;width:420px;max-height:250px;background:var(--surface);border:1px solid var(--border);border-radius:.5rem;overflow:hidden;z-index:100;box-shadow:0 8px 24px rgba(0,0,0,.4)}
    .log-overlay.visible{display:block}
    .log-header{padding:.4rem .65rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-size:.7rem;color:var(--muted)}
    .log-header button{background:none;border:none;color:var(--dim);cursor:pointer;font-size:.8rem}
    .log-content{padding:.5rem .65rem;overflow-y:auto;max-height:200px;font-family:monospace;font-size:.65rem;color:var(--muted);white-space:pre-wrap}
  </style>
</head>
<body>
  <header>
    <h1>kombify StackKits</h1>
    <div class="header-status">
      <span>VM:</span>
      <span class="dot dot-gray" id="vm-dot"></span>
      <span id="vm-label">checking...</span>
    </div>
  </header>

  <div class="main">
    <div class="sidebar">
      <div class="sidebar-header">Demo Environments</div>
      <div class="sidebar-content">
        <div id="demos"></div>
        <div class="portal-section">
          <div class="portal-title">Demo Dashboards</div>
          <a class="portal-link" href="http://dash.kombify.me:7880" target="_blank">Base Kit Dashboard</a>
          <a class="portal-link" href="http://dash.kombify.me:7980" target="_blank">Modern Homelab Dashboard</a>
          <a class="portal-link" href="http://dash.kombify.me:8180" target="_blank">High Availability Kit Dashboard</a>
        </div>
      </div>
    </div>
    <div class="terminal-area">
      <div class="terminal-header">
        <span class="dot dot-gray" id="term-dot"></span>
        <span id="term-label">Terminal — stackkits-vm</span>
      </div>
      <div id="terminal-container"></div>
    </div>
  </div>

  <div class="statusbar">
    <span id="container-count">Containers: —</span>
    <span id="refresh-time">Last refresh: —</span>
  </div>

  <div class="log-overlay" id="log-overlay">
    <div class="log-header">
      <span>Operation Log</span>
      <button onclick="document.getElementById('log-overlay').classList.remove('visible')">&times;</button>
    </div>
    <div class="log-content" id="log-content"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
  <script>
    // --- State ---
    let demos = [];
    let ws = null;
    let term = null;
    let fitAddon = null;

    // --- Terminal ---
    function initTerminal() {
      term = new window.Terminal({
        cursorBlink: true,
        fontSize: 13,
        fontFamily: "'Cascadia Code', 'Fira Code', 'JetBrains Mono', monospace",
        theme: { background: '#000000', foreground: '#e2e8f0', cursor: '#3b82f6' },
      });
      fitAddon = new window.FitAddon.FitAddon();
      term.loadAddon(fitAddon);
      term.open(document.getElementById('terminal-container'));
      fitAddon.fit();

      connectTerminal();

      term.onData(data => {
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: 'input', data }));
        }
      });

      window.addEventListener('resize', () => {
        fitAddon.fit();
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
        }
      });

      new ResizeObserver(() => {
        fitAddon.fit();
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
        }
      }).observe(document.getElementById('terminal-container'));
    }

    function connectTerminal() {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${proto}//${location.host}/ws/terminal`);

      ws.onopen = () => {
        document.getElementById('term-dot').className = 'dot dot-green';
        document.getElementById('term-label').textContent = 'Terminal — stackkits-vm (connected)';
        ws.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
      };

      ws.onmessage = (ev) => {
        const msg = JSON.parse(ev.data);
        if (msg.type === 'output') term.write(msg.data);
        if (msg.type === 'error') {
          term.write(`\r\n\x1b[31m${msg.data}\x1b[0m\r\n`);
        }
      };

      ws.onclose = () => {
        document.getElementById('term-dot').className = 'dot dot-red';
        document.getElementById('term-label').textContent = 'Terminal — disconnected (reconnecting...)';
        setTimeout(connectTerminal, 3000);
      };
    }

    // --- Demos ---
    async function fetchDemos() {
      try {
        const res = await fetch('/api/demos');
        demos = await res.json();
        renderDemos();
        updateStatusBar();
      } catch { /* retry next cycle */ }
    }

    function renderDemos() {
      const el = document.getElementById('demos');
      el.innerHTML = demos.map(d => `
        <div class="demo-card ${d.running ? 'running' : ''}" id="card-${d.name}">
          <div class="demo-card-header">
            <div class="demo-card-title">
              <span class="dot ${d.running ? 'dot-green' : 'dot-gray'}"></span>
              ${d.label}
              <span class="demo-port">:${d.port}</span>
            </div>
          </div>
          <div class="demo-actions">
            <button class="btn btn-start" onclick="startDemo('${d.name}')" ${d.running ? 'disabled' : ''}>Start</button>
            <button class="btn btn-stop" onclick="stopDemo('${d.name}')" ${!d.running ? 'disabled' : ''}>Stop</button>
            <button class="btn btn-test" onclick="testDemo('${d.name}')" ${!d.running ? 'disabled' : ''}>Test</button>
          </div>
          <div class="container-list">
            ${d.containers.map(c => `
              <div class="container-item">
                <span class="dot ${c.state === 'running' ? (c.health === 'healthy' ? 'dot-green' : 'dot-amber') : 'dot-red'}"></span>
                ${c.name} <span style="color:var(--dim)">${c.status}</span>
              </div>
            `).join('')}
            ${d.containers.length === 0 ? '<div class="container-item">No containers</div>' : ''}
          </div>
        </div>
      `).join('');
    }

    async function startDemo(name) {
      const btn = event.target;
      btn.classList.add('btn-loading');
      btn.disabled = true;
      showLog(`Starting ${name}...`);
      try {
        const res = await fetch(`/api/demos/${name}/start`, { method: 'POST' });
        const data = await res.json();
        if (data.ok) {
          appendLog(`\n${name} started successfully.\n${data.output || ''}`);
        } else {
          appendLog(`\nError: ${data.error}`);
        }
      } catch (e) {
        appendLog(`\nFailed: ${e.message}`);
      } finally {
        btn.classList.remove('btn-loading');
        fetchDemos();
      }
    }

    async function stopDemo(name) {
      const btn = event.target;
      btn.classList.add('btn-loading');
      btn.disabled = true;
      showLog(`Stopping ${name}...`);
      try {
        const res = await fetch(`/api/demos/${name}/stop`, { method: 'POST' });
        const data = await res.json();
        if (data.ok) {
          appendLog(`\n${name} stopped.`);
        } else {
          appendLog(`\nError: ${data.error}`);
        }
      } catch (e) {
        appendLog(`\nFailed: ${e.message}`);
      } finally {
        btn.classList.remove('btn-loading');
        fetchDemos();
      }
    }

    async function testDemo(name) {
      const btn = event.target;
      btn.classList.add('btn-loading');
      btn.disabled = true;
      showLog(`Testing ${name}...`);
      try {
        const res = await fetch(`/api/demos/${name}/test`, { method: 'POST' });
        const data = await res.json();
        appendLog(`\n${data.output || ''}`);
        if (data.ok) {
          appendLog(`\nAll tests passed.`);
        } else {
          appendLog(`\nSome tests failed (exit code ${data.exitCode}).`);
        }
      } catch (e) {
        appendLog(`\nTest failed: ${e.message}`);
      } finally {
        btn.classList.remove('btn-loading');
        btn.disabled = false;
      }
    }

    // --- VM Status ---
    async function fetchVM() {
      try {
        const res = await fetch('/api/vm');
        const vm = await res.json();
        const dot = document.getElementById('vm-dot');
        const label = document.getElementById('vm-label');
        if (vm.running && vm.health === 'healthy') {
          dot.className = 'dot dot-green';
          label.textContent = 'healthy';
        } else if (vm.running) {
          dot.className = 'dot dot-amber';
          label.textContent = vm.health || vm.status;
        } else {
          dot.className = 'dot dot-red';
          label.textContent = 'stopped';
        }
      } catch {
        document.getElementById('vm-dot').className = 'dot dot-red';
        document.getElementById('vm-label').textContent = 'unreachable';
      }
    }

    // --- Status bar ---
    function updateStatusBar() {
      const total = demos.reduce((sum, d) => sum + d.containers.length, 0);
      const running = demos.reduce((sum, d) => sum + d.containers.filter(c => c.state === 'running').length, 0);
      document.getElementById('container-count').textContent = `Demo containers: ${running}/${total} running`;
      document.getElementById('refresh-time').textContent = `Last refresh: ${new Date().toLocaleTimeString()}`;
    }

    // --- Log overlay ---
    function showLog(msg) {
      document.getElementById('log-content').textContent = msg;
      document.getElementById('log-overlay').classList.add('visible');
    }
    function appendLog(msg) {
      document.getElementById('log-content').textContent += msg;
    }

    // --- Init ---
    initTerminal();
    fetchVM();
    fetchDemos();
    setInterval(fetchDemos, 5000);
    setInterval(fetchVM, 10000);
  </script>
</body>
</html>
