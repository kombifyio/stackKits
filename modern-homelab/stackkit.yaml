# StackKit Metadata - Modern Homelab
# v1.0: Uses Docker Swarm + Dokploy (unified stack with base-homelab and ha-homelab)
apiVersion: stackkit/v1
kind: StackKit

metadata:
  name: modern-homelab
  version: "1.0.0-alpha"
  description: "Multi-server hybrid homelab with Docker Swarm, Dokploy, and public/remote access"
  author: "KombiStack Team"
  license: "MIT"
  repository: "https://github.com/kombihq/stackkits"
  status: scaffolding
  tags:
    - homelab
    - multi-node
    - docker
    - docker-swarm
    - dokploy
    - hybrid
    - public-access
    - advanced

# Platform: Docker (v1.0 unified stack)
platform: docker

# Supported operating systems
supportedOS:
  - ubuntu-24
  - ubuntu-22
  - debian-12

# Resource requirements
requirements:
  minimum:
    nodes: 2  # At least 2 nodes for hybrid setup
    cpu: 2
    memory: 4
    disk: 50
  recommended:
    nodes: 3
    cpu: 4
    memory: 8
    disk: 100

# =============================================================================
# DEPLOYMENT MODES
# =============================================================================
modes:
  simple:
    description: "OpenTofu-only deployment via KombiStack Core"
    templateDir: "templates/simple"
    engine: "opentofu"
    features:
      - "Direct OpenTofu execution"
      - "Go-based state management"
      - "Simple rollback via state"
    recommended_for:
      - "Initial setup"
      - "Development environments"

  advanced:
    description: "Terramate-orchestrated deployment with drift detection"
    templateDir: "templates/advanced"
    engine: "terramate"
    requires:
      - "terramate >= 0.5.0"
    features:
      - "Drift detection on schedule"
      - "Granular stack orchestration"
      - "Day-2 operations support"
    recommended_for:
      - "Production environments"
      - "Multi-node coordination"
    stacks:
      - name: network
        order: 1
        description: "VPN overlay, DNS, firewall"
      - name: platform
        order: 2
        after: [network]
        description: "Docker Swarm on all nodes"
      - name: services
        order: 3
        after: [platform]
        description: "Dokploy, monitoring, storage"

# =============================================================================
# FEATURE FLAGS
# =============================================================================
features:
  multiNode: true
  cloudProviders: true      # Can include cloud VPS nodes
  vpnOverlay: true          # Headscale/Tailscale for node communication
  publicAccess: true        # Services accessible from internet
  remoteAccess: true        # SSH/management from outside
  gpuSupport: false         # Future: GPU scheduling
  highAvailability: false   # Not full HA, but multi-node redundancy
  dockerSwarm: true         # Docker Swarm for multi-node
  kubernetes: false         # v1.1+ as separate StackKit
  gitops: false             # Manual deployments via Dokploy

# =============================================================================
# DOCKER SWARM CONFIGURATION
# =============================================================================
swarm:
  mode: "single-manager"  # One manager node (use ha-homelab for multi-manager)
  managers:
    count: 1
  workers:
    count: 1  # At least one worker
  network:
    driver: "overlay"
    encrypted: true

# =============================================================================
# NODE TYPES
# =============================================================================
nodeTypes:
  # Local nodes (on-premises)
  local:
    description: "On-premises server in local network"
    access: "vpn"  # Accessed via VPN overlay
    requirements:
      minMemory: 4
      minDisk: 50

  # Cloud nodes (VPS)
  cloud:
    description: "Cloud VPS (Hetzner, DigitalOcean, etc.)"
    access: "public"  # Has public IP
    requirements:
      minMemory: 2
      minDisk: 20
    providers:
      - hetzner
      - digitalocean
      - vultr
      - linode

# =============================================================================
# NETWORK MODES
# =============================================================================
network:
  # Hybrid mode: Mix of local and cloud nodes
  mode: "hybrid"  # local | public | hybrid
  
  # VPN overlay for node-to-node communication
  vpn:
    enabled: true
    provider: "headscale"  # headscale | tailscale | wireguard
    
  # Public access configuration
  public:
    enabled: true
    entrypoint: "cloud"  # cloud node acts as entry point
    
  # DNS configuration
  dns:
    provider: "cloudflare"  # cloudflare | manual | none
    domain: null  # User must configure

# =============================================================================
# VARIANTS (Service Set Choices)
# =============================================================================
variants:
  # Default: Full-featured hybrid setup with Dokploy
  default:
    name: "Standard"
    description: "Dokploy PaaS with Headscale VPN and full monitoring"
    services:
      - dokploy          # PaaS platform (Swarm-enabled)
      - traefik          # Reverse proxy with TLS
      - headscale        # VPN overlay for node communication
      - prometheus       # Metrics collection
      - grafana          # Dashboards
      - loki             # Log aggregation
      - uptime-kuma      # Status monitoring

  # Minimal: Basic hybrid setup
  minimal:
    name: "Minimal"
    description: "Dokploy with basic VPN, minimal monitoring"
    services:
      - dokploy
      - traefik
      - headscale
      - uptime-kuma

  # Beszel: Alternative monitoring
  beszel:
    name: "Beszel Monitoring"
    description: "Dokploy with Beszel for lightweight monitoring"
    services:
      - dokploy
      - traefik
      - headscale
      - beszel

  # Coolify: Alternative PaaS (for users who prefer Coolify)
  coolify:
    name: "Coolify Alternative"
    description: "Coolify PaaS instead of Dokploy"
    services:
      - coolify
      - traefik
      - headscale
      - uptime-kuma

# =============================================================================
# KEY DIFFERENCES FROM OTHER STACKKITS
# =============================================================================
# 
# | Aspect          | base-homelab        | modern-homelab           | ha-homelab           |
# |-----------------|---------------------|--------------------------|----------------------|
# | Nodes           | Single              | Multiple (2-5)           | Multiple (3+)        |
# | Platform        | Docker              | Docker Swarm             | Docker Swarm HA      |
# | PaaS            | Dokploy             | Dokploy                  | Dokploy              |
# | Network         | Local only          | Hybrid (local + cloud)   | Hybrid + failover    |
# | VPN             | None                | Headscale/Tailscale      | Headscale            |
# | Public Access   | Optional add-on     | Default enabled          | Default enabled      |
# | Monitoring      | Basic (Uptime Kuma) | Full stack (Prometheus)  | HA Prometheus        |
# | Complexity      | Beginner            | Intermediate             | Advanced             |
# =============================================================================

# Auto-selection rules
autoSelect:
  advancedWhen:
    - "driftDetection.enabled == true"
    - "nodes.count > 3"
  default: simple

# =============================================================================
# CHANGELOG
# =============================================================================
changelog:
  - version: "1.0.0-alpha"
    date: "2026-01-15"
    changes:
      - "BREAKING: Switched from Coolify to Dokploy for unified v1.0 stack"
      - "Added Docker Swarm support for multi-node"
      - "Added Coolify as optional variant for compatibility"
      - "Updated comparison table with ha-homelab"
      
  - version: "0.1.0-alpha"
    date: "2025-01-27"
    changes:
      - "Initial scaffolding"
      - "Hybrid architecture planning (originally Coolify-based)"
