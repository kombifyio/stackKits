server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/javascript application/json;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # CLI downloads - must be before static assets regex
    location = /cli/stackkit-windows-amd64.exe {
        alias /usr/share/nginx/html/cli/stackkit-windows-amd64.exe;
        add_header Content-Type "application/octet-stream" always;
        add_header Content-Disposition "attachment; filename=\"stackkit-windows-amd64.exe\"" always;
        add_header Cache-Control "public, max-age=86400" always;
        access_log off;
    }

    # Static assets with long cache (no .exe here to avoid conflict)
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # React Router - handle client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
