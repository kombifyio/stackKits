# LLDAP Module Reference Compose
# Purpose: Validate LLDAP directory service + Traefik routing + LDAP protocol
#
# Architecture:
#   traefik → lldap (web UI on 17170, LDAP on 3890)
#
# Usage:
#   docker compose -f modules/lldap/tests/reference-compose.yml up -d --wait
#   ./modules/lldap/tests/integration_test.sh

services:
  traefik:
    image: traefik:v3.3
    container_name: test-traefik-lldap
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "8897:80"
      - "19097:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "traefik", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - test-net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

  lldap:
    image: lldap/lldap:latest
    container_name: test-lldap
    environment:
      LLDAP_LDAP_USER_PASS: "test-admin-pass"
      LLDAP_JWT_SECRET: "test-jwt-secret-for-integration"
      LLDAP_LDAP_BASE_DN: "dc=test,dc=local"
      LLDAP_HTTP_URL: "http://ldap.test.local"
    volumes:
      - lldap-data:/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.lldap.rule=Host(`ldap.test.local`)"
      - "traefik.http.routers.lldap.entrypoints=web"
      - "traefik.http.services.lldap.loadbalancer.server.port=17170"
    healthcheck:
      test: ["CMD", "/app/lldap", "healthcheck", "--config-file", "/data/lldap_config.toml"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - test-net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    mem_limit: 256m
    cpus: 0.25

  lldap-provisioner:
    image: alpine/curl:latest
    container_name: test-lldap-provisioner
    depends_on:
      lldap:
        condition: service_healthy
    command:
      - sh
      - -c
      - |
        echo "Provisioning LLDAP default groups..."
        token=$$(curl -s -X POST http://lldap:17170/auth/simple/login \
          -H "Content-Type: application/json" \
          -d '{"username":"admin","password":"test-admin-pass"}' | \
          grep -o '"token":"[^"]*"' | cut -d'"' -f4)
        if [ -z "$$token" ]; then
          echo "LLDAP: failed to authenticate"
          exit 1
        fi
        echo "LLDAP: authenticated, creating default groups..."
        for group in homelab_owner homelab_operator homelab_developer homelab_viewer; do
          result=$$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST http://lldap:17170/api/graphql \
            -H "Authorization: Bearer $$token" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"mutation { createGroup(name: \\\"$$group\\\") { id displayName } }\"}")
          echo "  $$group → HTTP $$result"
        done
        echo "LLDAP: default groups provisioned"
    networks:
      - test-net
    restart: "no"

networks:
  test-net:
    driver: bridge

volumes:
  lldap-data:
