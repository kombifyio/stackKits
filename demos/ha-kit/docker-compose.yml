# =============================================================================
# High Availability Kit Demo — 3-Node High-Availability Simulation (self-contained)
# =============================================================================
#
# Simulates the ha-kit architecture:
#   Main node:     Traefik, TinyAuth, PocketID, PostgreSQL, Prometheus, Grafana
#   Worker node 1: Dokploy (PaaS)
#   Worker node 2: Uptime Kuma, Whoami
#
# Usage:
#   docker compose -f demos/ha-kit/docker-compose.yml up -d
#
# Ports:
#   8180  — HTTP (Traefik entrypoint)
#   8290  — Traefik Dashboard/API
#
# Credentials:
#   TinyAuth: admin / admin123
#   Grafana:  admin / admin123
#
# Domains (kombify.me → auto-resolves to 127.0.0.1, no /etc/hosts needed):
#   auth.kombify.me:8180          — TinyAuth login
#   id.kombify.me:8180            — PocketID (OIDC)
#   dokploy.kombify.me:8180       — Dokploy PaaS
#   prometheus.kombify.me:8180    — Prometheus
#   grafana.kombify.me:8180       — Grafana dashboards
#   proxy.kombify.me:8180         — Traefik dashboard
#   dash.kombify.me:8180          — Dashboard hub
#   status.kombify.me:8180        — Uptime Kuma
#   whoami.kombify.me:8180        — Network diagnostic
#
# Key Differences from Base Kit:
#   - 3-node topology (main + 2 workers)
#   - Prometheus + Grafana monitoring stack
#   - PostgreSQL HA-ready (isolated DB network)
#   - Service placement by node role
# =============================================================================

services:
  # ===========================================================================
  # MAIN NODE — Control plane, monitoring, databases
  # ===========================================================================

  # Layer 2: Traefik — Load Balancer (inline dynamic config)
  traefik:
    image: traefik:v3.3
    container_name: ha-traefik
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mkdir -p /etc/traefik
        cat > /etc/traefik/dynamic.yml << 'DYNAMIC'
        http:
          routers:
            tinyauth:
              rule: "Host(`auth.kombify.me`)"
              entryPoints: [web]
              service: tinyauth
            pocketid:
              rule: "Host(`id.kombify.me`)"
              entryPoints: [web]
              service: pocketid
            prometheus:
              rule: "Host(`prometheus.kombify.me`)"
              entryPoints: [web]
              service: prometheus
              middlewares: [tinyauth-forward]
            grafana:
              rule: "Host(`grafana.kombify.me`)"
              entryPoints: [web]
              service: grafana
              middlewares: [tinyauth-forward]
            traefik-dashboard:
              rule: "Host(`proxy.kombify.me`)"
              entryPoints: [web]
              service: traefik-api
              middlewares: [tinyauth-forward]
            dashboard:
              rule: "Host(`dash.kombify.me`)"
              entryPoints: [web]
              service: dashboard
              middlewares: [tinyauth-forward]
            dokploy:
              rule: "Host(`dokploy.kombify.me`)"
              entryPoints: [web]
              service: dokploy
              middlewares: [tinyauth-forward]
            kuma:
              rule: "Host(`status.kombify.me`)"
              entryPoints: [web]
              service: kuma
              middlewares: [tinyauth-forward]
            whoami:
              rule: "Host(`whoami.kombify.me`)"
              entryPoints: [web]
              service: whoami
              middlewares: [tinyauth-forward]
          services:
            tinyauth:
              loadBalancer:
                servers:
                  - url: "http://tinyauth:3000"
            pocketid:
              loadBalancer:
                servers:
                  - url: "http://pocketid:1411"
            prometheus:
              loadBalancer:
                servers:
                  - url: "http://prometheus:9090"
            grafana:
              loadBalancer:
                servers:
                  - url: "http://grafana:3002"
            traefik-api:
              loadBalancer:
                servers:
                  - url: "http://traefik:8080"
            dashboard:
              loadBalancer:
                servers:
                  - url: "http://dashboard:80"
            dokploy:
              loadBalancer:
                servers:
                  - url: "http://dokploy:3000"
            kuma:
              loadBalancer:
                servers:
                  - url: "http://kuma:3001"
            whoami:
              loadBalancer:
                servers:
                  - url: "http://whoami:80"
          middlewares:
            tinyauth-forward:
              forwardAuth:
                address: "http://tinyauth:3000/api/auth/traefik"
                trustForwardHeader: true
                authResponseHeaders:
                  - remote-user
                  - remote-sub
                  - remote-name
                  - remote-email
                  - remote-groups
        DYNAMIC
        exec traefik \
          --api.insecure=true \
          --ping=true \
          --entrypoints.web.address=:80 \
          --providers.file.filename=/etc/traefik/dynamic.yml \
          --providers.file.watch=true \
          --log.level=ERROR
    ports:
      - "8180:80"
      - "8290:8080"
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - main_net
      - worker1_net
      - worker2_net

  # Layer 2: TinyAuth — ForwardAuth (main node)
  tinyauth:
    image: ghcr.io/steveiliop56/tinyauth:v4
    container_name: ha-tinyauth
    restart: unless-stopped
    environment:
      - TZ=Europe/Berlin
      - APP_URL=http://auth.kombify.me:8180
      - "USERS=admin:$$2b$$12$$Osp9VbUj1xvhgmOeVlB/rOuayl4w0DvseE8W0O.J1m6WdVLV8EQbO"
      - SECURE_COOKIE=false
      - SESSION_EXPIRY=86400
    volumes:
      - tinyauth-data:/data
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "tinyauth", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      traefik:
        condition: service_healthy
    networks:
      - main_net

  # Layer 2: PocketID — OIDC Provider (main node)
  pocketid:
    image: ghcr.io/pocket-id/pocket-id:v2
    container_name: ha-pocketid
    restart: unless-stopped
    environment:
      - TZ=Europe/Berlin
      - APP_URL=http://id.kombify.me:8180
      - TRUST_PROXY=true
      - PORT=1411
      - ENCRYPTION_KEY=ha-kit-encryption-key-2026
    volumes:
      - pocketid-data:/app/data
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "/app/pocket-id", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    depends_on:
      traefik:
        condition: service_healthy
    networks:
      - main_net

  # Layer 2: PostgreSQL — HA Database (main node, isolated)
  postgres:
    image: postgres:16-alpine
    container_name: ha-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=kombistack
      - POSTGRES_PASSWORD=ha-kombistack-pass-2026
      - POSTGRES_DB=kombistack
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kombistack -d kombistack"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - main_db
      - worker1_net

  # Monitoring: Prometheus (main node, inline config)
  prometheus:
    image: prom/prometheus:latest
    container_name: ha-prometheus
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        cat > /etc/prometheus/prometheus.yml << 'PROMCONFIG'
        global:
          scrape_interval: 15s
          evaluation_interval: 15s
        scrape_configs:
          - job_name: "prometheus"
            static_configs:
              - targets: ["localhost:9090"]
          - job_name: "traefik"
            static_configs:
              - targets: ["traefik:8080"]
        PROMCONFIG
        exec /bin/prometheus \
          --config.file=/etc/prometheus/prometheus.yml \
          --storage.tsdb.path=/prometheus \
          --storage.tsdb.retention.time=15d \
          --web.enable-lifecycle
    volumes:
      - prometheus-data:/prometheus
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      traefik:
        condition: service_healthy
    networks:
      - main_net

  # Monitoring: Grafana (main node)
  grafana:
    image: grafana/grafana:latest
    container_name: ha-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_SERVER_HTTP_PORT=3002
      - GF_SERVER_ROOT_URL=http://grafana.kombify.me:8180
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3002/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      prometheus:
        condition: service_healthy
    networks:
      - main_net

  # Dashboard — Service Hub (main node)
  dashboard:
    image: nginx:alpine
    container_name: ha-dashboard
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        cat > /usr/share/nginx/html/index.html << 'DASHBOARD'
        <!DOCTYPE html>
        <html><head><meta charset="utf-8"><title>kombify High Availability Kit</title>
        <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:system-ui,-apple-system,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center}
        .container{max-width:900px;width:100%;padding:2rem}
        h1{font-size:2rem;margin-bottom:.5rem;background:linear-gradient(135deg,#f59e0b,#ef4444);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .subtitle{color:#94a3b8;margin-bottom:2rem}
        .section{margin-bottom:1.5rem}
        .section h2{font-size:.85rem;text-transform:uppercase;color:#64748b;letter-spacing:.1em;margin-bottom:.75rem;padding-left:.25rem}
        .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:.75rem}
        .card{background:#1e293b;border:1px solid #334155;border-radius:.75rem;padding:1rem;text-decoration:none;color:#e2e8f0;transition:all .2s}
        .card:hover{border-color:#f59e0b;transform:translateY(-2px);box-shadow:0 4px 12px rgba(245,158,11,.2)}
        .card h3{font-size:.9rem;margin-bottom:.2rem}
        .card p{font-size:.75rem;color:#94a3b8}
        .badge{display:inline-block;font-size:.6rem;padding:.1rem .35rem;border-radius:.2rem;margin-bottom:.4rem}
        .main{background:#451a03;color:#fbbf24}
        .w1{background:#172554;color:#60a5fa}
        .w2{background:#1e3a5f;color:#38bdf8}
        .auth{background:#3b1e5f;color:#c084fc}
        .mon{background:#422006;color:#fb923c}
        footer{text-align:center;margin-top:2rem;color:#475569;font-size:.75rem}
        .topology{display:flex;gap:.75rem;margin-bottom:1.5rem;padding:1rem;background:#1e293b;border-radius:.75rem;border:1px solid #334155}
        .topo-node{flex:1;padding:.75rem;border-radius:.5rem;text-align:center}
        .topo-main{background:#451a03;border:1px solid #f59e0b}
        .topo-w1{background:#172554;border:1px solid #3b82f6}
        .topo-w2{background:#1e3a5f;border:1px solid #0ea5e9}
        .topo-node h4{font-size:.8rem;margin-bottom:.25rem}
        .topo-node p{font-size:.65rem;color:#94a3b8}
        </style></head><body>
        <div class="container">
        <h1>kombify High Availability Kit</h1>
        <p class="subtitle">High-Availability — 3-node topology with monitoring</p>
        <div class="topology">
        <div class="topo-node topo-main"><h4>Main Node</h4><p>Traefik, Auth, DB, Monitoring</p></div>
        <div class="topo-node topo-w1"><h4>Worker 1</h4><p>Dokploy PaaS</p></div>
        <div class="topo-node topo-w2"><h4>Worker 2</h4><p>Kuma, Whoami</p></div>
        </div>
        <div class="section"><h2>Main Node</h2>
        <div class="grid">
        <a class="card" href="http://auth.kombify.me:8180"><span class="badge auth">Auth</span><h3>TinyAuth</h3><p>ForwardAuth Proxy</p></a>
        <a class="card" href="http://id.kombify.me:8180"><span class="badge auth">Auth</span><h3>PocketID</h3><p>OIDC Provider</p></a>
        <a class="card" href="http://prometheus.kombify.me:8180"><span class="badge mon">Monitor</span><h3>Prometheus</h3><p>Metrics Collection</p></a>
        <a class="card" href="http://grafana.kombify.me:8180"><span class="badge mon">Monitor</span><h3>Grafana</h3><p>Dashboards</p></a>
        <a class="card" href="http://proxy.kombify.me:8180"><span class="badge main">Main</span><h3>Traefik</h3><p>Load Balancer</p></a>
        </div></div>
        <div class="section"><h2>Worker Nodes</h2>
        <div class="grid">
        <a class="card" href="http://dokploy.kombify.me:8180"><span class="badge w1">Worker 1</span><h3>Dokploy</h3><p>PaaS Platform</p></a>
        <a class="card" href="http://status.kombify.me:8180"><span class="badge w2">Worker 2</span><h3>Uptime Kuma</h3><p>Status Monitor</p></a>
        <a class="card" href="http://whoami.kombify.me:8180"><span class="badge w2">Worker 2</span><h3>Whoami</h3><p>Network Diagnostic</p></a>
        </div></div>
        <footer>kombify StackKits &mdash; High Availability Kit Demo (3-node topology)</footer>
        </div></body></html>
        DASHBOARD
        nginx -g "daemon off;"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    depends_on:
      traefik:
        condition: service_healthy
    networks:
      - main_net

  # ===========================================================================
  # WORKER NODE 1 — PaaS Platform
  # ===========================================================================

  dokploy-redis:
    image: redis:7-alpine
    container_name: ha-dokploy-redis
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - worker1_net

  dokploy:
    image: dokploy/dokploy:latest
    container_name: ha-dokploy
    restart: unless-stopped
    user: "0:0"
    environment:
      - DATABASE_URL=postgresql://kombistack:ha-kombistack-pass-2026@postgres:5432/kombistack
      - REDIS_URL=redis://dokploy-redis:6379
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - dokploy-data:/etc/dokploy
      - /var/run/docker.sock:/var/run/docker.sock
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      postgres:
        condition: service_healthy
      dokploy-redis:
        condition: service_healthy
      traefik:
        condition: service_healthy
    networks:
      - worker1_net

  # ===========================================================================
  # WORKER NODE 2 — Monitoring + Services
  # ===========================================================================

  kuma:
    image: louislam/uptime-kuma:1
    container_name: ha-kuma
    restart: unless-stopped
    volumes:
      - kuma-data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const http=require('http');const o={hostname:'localhost',port:3001,path:'/api/status-page/heartbeat/demo',timeout:2000};const r=http.request(o,res=>{process.exit(res.statusCode===200?0:1)});r.on('error',()=>process.exit(1));r.end()\"||exit 0"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      traefik:
        condition: service_healthy
    networks:
      - worker2_net

  whoami:
    image: traefik/whoami:latest
    container_name: ha-whoami
    restart: unless-stopped
    networks:
      - worker2_net

# =============================================================================
# Networks — Simulating 3-node topology
# =============================================================================
networks:
  main_net:
    name: ha_main_net
  worker1_net:
    name: ha_worker1_net
  worker2_net:
    name: ha_worker2_net
  main_db:
    name: ha_main_db
    internal: true

# =============================================================================
# Volumes
# =============================================================================
volumes:
  tinyauth-data:
  pocketid-data:
  postgres-data:
  prometheus-data:
  grafana-data:
  dokploy-data:
  kuma-data:
