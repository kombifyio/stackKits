# =============================================================================
# Base Kit Demo — All 9 services in one compose (self-contained)
# =============================================================================
#
# Usage:
#   docker compose -f demos/base-kit/docker-compose.yml up -d
#
# Ports:
#   7880  — HTTP (Traefik entrypoint)
#   7090  — Traefik Dashboard/API
#
# Credentials:
#   TinyAuth: admin / admin123
#   Dokploy: First-run setup via UI
#
# Domains (stack.local → auto-resolves to 127.0.0.1, no /etc/hosts needed):
#   auth.stack.local:7880       — TinyAuth login
#   id.stack.local:7880         — PocketID (OIDC)
#   dokploy.stack.local:7880    — Dokploy PaaS
#   dash.stack.local:7880       — Dashboard
#   kuma.stack.local:7880       — Uptime Kuma
#   whoami.stack.local:7880     — Network diagnostic
#   proxy.stack.local:7880      — Traefik dashboard
#
# LAN access (from other devices, no setup required):
#   Uses sslip.io — e.g. dash.<server-ip>.sslip.io:7880
#   All services accessible without /etc/hosts or local DNS.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Layer 2: Traefik — Reverse Proxy (inline dynamic config, no bind mounts)
  # ---------------------------------------------------------------------------
  traefik:
    image: traefik:v3.3
    container_name: demo-traefik
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mkdir -p /etc/traefik
        cat > /etc/traefik/dynamic.yml << 'DYNAMIC'
        http:
          routers:
            # --- Auth-free services (local + LAN in one rule) ---
            tinyauth:
              rule: "Host(`auth.stack.local`) || HostRegexp(`^auth[.].+[.]sslip[.]io$`)"
              entryPoints: [web]
              service: tinyauth
            pocketid:
              rule: "Host(`id.stack.local`) || HostRegexp(`^id[.].+[.]sslip[.]io$`)"
              entryPoints: [web]
              service: pocketid
            # --- Dashboard (no auth — always accessible) ---
            dashboard:
              rule: "Host(`dash.stack.local`) || HostRegexp(`^dash[.].+[.]sslip[.]io$`)"
              entryPoints: [web]
              service: dashboard
            # --- Auth-protected services (local with auth) ---
            dokploy:
              rule: "Host(`dokploy.stack.local`)"
              entryPoints: [web]
              service: dokploy
              middlewares: [tinyauth-forward]
            kuma:
              rule: "Host(`kuma.stack.local`)"
              entryPoints: [web]
              service: kuma
              middlewares: [tinyauth-forward]
            whoami:
              rule: "Host(`whoami.stack.local`)"
              entryPoints: [web]
              service: whoami
              middlewares: [tinyauth-forward]
            traefik-dashboard:
              rule: "Host(`proxy.stack.local`)"
              entryPoints: [web]
              service: traefik-api
              middlewares: [tinyauth-forward]
            # --- LAN routers (sslip.io, no auth) ---
            dokploy-lan:
              rule: "HostRegexp(`^dokploy[.].+[.]sslip[.]io$`)"
              entryPoints: [web]
              service: dokploy
            kuma-lan:
              rule: "HostRegexp(`^kuma[.].+[.]sslip[.]io$`)"
              entryPoints: [web]
              service: kuma
            whoami-lan:
              rule: "HostRegexp(`^whoami[.].+[.]sslip[.]io$`)"
              entryPoints: [web]
              service: whoami
            traefik-dashboard-lan:
              rule: "HostRegexp(`^proxy[.].+[.]sslip[.]io$`)"
              entryPoints: [web]
              service: traefik-api
            # --- Catch-all: IP/unknown host -> dashboard ---
            default-fallback:
              rule: "HostRegexp(`.+`)"
              entryPoints: [web]
              service: dashboard
              priority: 1
          services:
            tinyauth:
              loadBalancer:
                servers:
                  - url: "http://tinyauth:3000"
            pocketid:
              loadBalancer:
                servers:
                  - url: "http://pocketid:1411"
            dokploy:
              loadBalancer:
                servers:
                  - url: "http://dokploy:3000"
            dashboard:
              loadBalancer:
                servers:
                  - url: "http://dashboard:80"
            kuma:
              loadBalancer:
                servers:
                  - url: "http://kuma:3001"
            whoami:
              loadBalancer:
                servers:
                  - url: "http://whoami:80"
            traefik-api:
              loadBalancer:
                servers:
                  - url: "http://traefik:8080"
          middlewares:
            tinyauth-forward:
              forwardAuth:
                address: "http://tinyauth:3000/api/auth/traefik"
                trustForwardHeader: true
                authResponseHeaders:
                  - remote-user
                  - remote-sub
                  - remote-name
                  - remote-email
                  - remote-groups
        DYNAMIC
        exec traefik \
          --api.insecure=true \
          --ping=true \
          --entrypoints.web.address=:80 \
          --providers.file.filename=/etc/traefik/dynamic.yml \
          --providers.file.watch=true \
          --log.level=ERROR
    ports:
      - "7880:80"
      - "7090:8080"
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - base_net

  # ---------------------------------------------------------------------------
  # Layer 2: TinyAuth — ForwardAuth (requires: traefik)
  # ---------------------------------------------------------------------------
  tinyauth:
    image: ghcr.io/steveiliop56/tinyauth:v4
    container_name: demo-tinyauth
    restart: unless-stopped
    environment:
      - TZ=Europe/Berlin
      - APP_URL=http://auth.stack.local:7880
      - "USERS=admin:$$2b$$12$$Osp9VbUj1xvhgmOeVlB/rOuayl4w0DvseE8W0O.J1m6WdVLV8EQbO"
      - SECURE_COOKIE=false
      - SESSION_EXPIRY=86400
    volumes:
      - tinyauth-data:/data
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "tinyauth", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      traefik:
        condition: service_healthy
    networks:
      - base_net

  # ---------------------------------------------------------------------------
  # Layer 2: PocketID — OIDC Provider (requires: traefik)
  # ---------------------------------------------------------------------------
  pocketid:
    image: ghcr.io/pocket-id/pocket-id:v2
    container_name: demo-pocketid
    restart: unless-stopped
    environment:
      - TZ=Europe/Berlin
      - APP_URL=http://id.stack.local:7880
      - TRUST_PROXY=true
      - PORT=1411
      - ENCRYPTION_KEY=demo-base-kit-encryption-key-2026
    volumes:
      - pocketid-data:/app/data
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "/app/pocket-id", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    depends_on:
      traefik:
        condition: service_healthy
    networks:
      - base_net

  # ---------------------------------------------------------------------------
  # Layer 2: Dokploy PostgreSQL (internal, isolated network)
  # ---------------------------------------------------------------------------
  dokploy-postgres:
    image: postgres:16-alpine
    container_name: demo-dokploy-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=dokploy
      - POSTGRES_PASSWORD=demo-dokploy-pass-2024
      - POSTGRES_DB=dokploy
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - dokploy-postgres-data:/var/lib/postgresql/data
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dokploy -d dokploy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal_db

  # ---------------------------------------------------------------------------
  # Layer 2: Dokploy Redis (internal, isolated network)
  # ---------------------------------------------------------------------------
  dokploy-redis:
    image: redis:7-alpine
    container_name: demo-dokploy-redis
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - internal_db

  # ---------------------------------------------------------------------------
  # Layer 2: Dokploy — PaaS Platform (requires: traefik, postgres, redis)
  # ---------------------------------------------------------------------------
  dokploy:
    image: dokploy/dokploy:latest
    container_name: demo-dokploy
    restart: unless-stopped
    user: "0:0"
    environment:
      - DATABASE_URL=postgresql://dokploy:demo-dokploy-pass-2024@dokploy-postgres:5432/dokploy
      - REDIS_URL=redis://dokploy-redis:6379
      - NODE_ENV=production
      - PORT=3000
      - TRPC_PLAYGROUND=false
    volumes:
      - dokploy-data:/etc/dokploy
      - /var/run/docker.sock:/var/run/docker.sock
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      dokploy-postgres:
        condition: service_healthy
      dokploy-redis:
        condition: service_healthy
      traefik:
        condition: service_healthy
    networks:
      - base_net
      - internal_db

  # ---------------------------------------------------------------------------
  # Layer 3: Dashboard — Service Links Hub (requires: traefik)
  # ---------------------------------------------------------------------------
  dashboard:
    image: nginx:alpine
    container_name: demo-dashboard
    restart: unless-stopped
    environment:
      STACKKIT_NAME: "kombify Base Kit"
      STACKKIT_COLOR: "#3b82f6"
      STACKKIT_API_PORT: "7090"
      STACKKIT_REGISTRY: '[{"n":"Docker Engine","d":"Container Runtime","l":"L1","nd":"main"},{"n":"SSH Hardening","d":"Secure Access","l":"L1","nd":"main"},{"n":"Firewall","d":"Network Security","l":"L1","nd":"main"},{"r":"traefik-dashboard","n":"Traefik","d":"Reverse Proxy","l":"L2","nd":"main"},{"r":"tinyauth","n":"TinyAuth","d":"ForwardAuth Proxy","l":"L2","nd":"main"},{"r":"pocketid","n":"PocketID","d":"OIDC Identity Provider","l":"L2","nd":"main"},{"r":"dokploy","n":"Dokploy","d":"PaaS Deployment","l":"L2","nd":"main"},{"r":"kuma","n":"Uptime Kuma","d":"Status Monitoring","l":"L3","nd":"main"},{"r":"whoami","n":"Whoami","d":"Network Debug","l":"L3","nd":"main"}]'
    security_opt:
      - no-new-privileges:true
    volumes:
      - ../dashboard.sh:/dashboard.sh:ro
    entrypoint: ["/bin/sh", "/dashboard.sh"]
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    depends_on:
      traefik:
        condition: service_healthy
    networks:
      - base_net

  # ---------------------------------------------------------------------------
  # Layer 3: Uptime Kuma — Monitoring (requires: traefik)
  # ---------------------------------------------------------------------------
  kuma:
    image: louislam/uptime-kuma:1
    container_name: demo-kuma
    restart: unless-stopped
    volumes:
      - kuma-data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const http=require('http');const o={hostname:'localhost',port:3001,path:'/api/status-page/heartbeat/demo',timeout:2000};const r=http.request(o,res=>{process.exit(res.statusCode===200?0:1)});r.on('error',()=>process.exit(1));r.end()\"||exit 0"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      traefik:
        condition: service_healthy
    networks:
      - base_net

  # ---------------------------------------------------------------------------
  # Layer 3: Whoami — Network Diagnostic (requires: traefik)
  # ---------------------------------------------------------------------------
  whoami:
    image: traefik/whoami:latest
    container_name: demo-whoami
    restart: unless-stopped
    networks:
      - base_net

# =============================================================================
# Networks
# =============================================================================
networks:
  base_net:
    name: demo_base_net
  internal_db:
    name: demo_internal_db
    internal: true

# =============================================================================
# Volumes
# =============================================================================
volumes:
  tinyauth-data:
  pocketid-data:
  dokploy-data:
  dokploy-postgres-data:
  kuma-data:
