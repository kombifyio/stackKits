# Modern Homelab Demo — Traefik dynamic configuration
# Hybrid topology: cloud node (public) + local node (compute)
# Domains: *.modern.local

http:
  routers:
    # Auth services (no ForwardAuth — they ARE the auth)
    tinyauth:
      rule: "Host(`auth.modern.local`)"
      entryPoints: [web]
      service: tinyauth

    pocketid:
      rule: "Host(`id.modern.local`)"
      entryPoints: [web]
      service: pocketid

    # Cloud node services (ForwardAuth protected)
    dokploy:
      rule: "Host(`dokploy.modern.local`)"
      entryPoints: [web]
      service: dokploy
      middlewares: [tinyauth-forward]

    dozzle:
      rule: "Host(`logs.modern.local`)"
      entryPoints: [web]
      service: dozzle
      middlewares: [tinyauth-forward]

    kuma:
      rule: "Host(`status.modern.local`)"
      entryPoints: [web]
      service: kuma
      middlewares: [tinyauth-forward]

    traefik-dashboard:
      rule: "Host(`traefik.modern.local`)"
      entryPoints: [web]
      service: traefik-api
      middlewares: [tinyauth-forward]

    dashboard:
      rule: "Host(`modern.modern.local`)"
      entryPoints: [web]
      service: dashboard
      middlewares: [tinyauth-forward]

    # Local node services (routed through cloud Traefik)
    local-app:
      rule: "Host(`app.modern.local`)"
      entryPoints: [web]
      service: local-app
      middlewares: [tinyauth-forward]

    local-whoami:
      rule: "Host(`whoami.modern.local`)"
      entryPoints: [web]
      service: local-whoami
      middlewares: [tinyauth-forward]

  services:
    tinyauth:
      loadBalancer:
        servers:
          - url: "http://tinyauth:3000"

    pocketid:
      loadBalancer:
        servers:
          - url: "http://pocketid:1411"

    dokploy:
      loadBalancer:
        servers:
          - url: "http://dokploy:3000"

    dozzle:
      loadBalancer:
        servers:
          - url: "http://dozzle:8080"

    kuma:
      loadBalancer:
        servers:
          - url: "http://kuma:3001"

    traefik-api:
      loadBalancer:
        servers:
          - url: "http://traefik:8080"

    dashboard:
      loadBalancer:
        servers:
          - url: "http://dashboard:80"

    local-app:
      loadBalancer:
        servers:
          - url: "http://local-nginx:80"

    local-whoami:
      loadBalancer:
        servers:
          - url: "http://local-whoami:80"

  middlewares:
    tinyauth-forward:
      forwardAuth:
        address: "http://tinyauth:3000/api/auth/traefik"
        trustForwardHeader: true
        authResponseHeaders:
          - remote-user
          - remote-sub
          - remote-name
          - remote-email
          - remote-groups
