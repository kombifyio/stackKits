# StackKit Metadata - High Availability Kit
# v1.0: Uses Docker Swarm HA (Kubernetes planned for v1.1+ as separate StackKit)
apiVersion: stackkit/v1
kind: StackKit

metadata:
  name: ha-kit
  version: "1.0.0-alpha"
  description: "Enterprise-grade homelab with Docker Swarm HA and automatic failover"
  author: "kombify Stack Team"
  license: "Apache-2.0"
  repository: "https://github.com/kombihq/stackkits"
  status: scaffolding
  tags:
    - homelab
    - multi-node
    - docker-swarm
    - high-availability
    - enterprise
    - advanced
    - dokploy

# Extends Modern Homelab
extends: modern-homelab

# Platform: Docker (v1.0 unified stack)
# NOTE: Kubernetes support will be added in v1.1+ as separate StackKits (k3s-homelab, k8s-cluster)
platform: docker

# Supported operating systems
supportedOS:
  - ubuntu-24
  - ubuntu-22
  - debian-12

# Resource requirements (per node)
requirements:
  minimum:
    managerNodes: 3  # Swarm manager nodes for HA
    workerNodes: 0   # Optional worker nodes
    cpu: 4
    memory: 8
    disk: 100
    diskType: ssd
  recommended:
    managerNodes: 3
    workerNodes: 2
    cpu: 8
    memory: 16
    disk: 256
    diskType: nvme

# =============================================================================
# DEPLOYMENT MODES
# =============================================================================
modes:
  simple:
    description: "OpenTofu-only deployment via kombify Stack Core"
    templateDir: "templates/simple"
    engine: "opentofu"
    recommended: false  # Not recommended for HA

  advanced:
    description: "Terramate-orchestrated deployment with drift detection"
    templateDir: "templates/advanced"
    engine: "terramate"
    requires:
      - "terramate >= 0.5.0"
    recommended: true  # Recommended for HA deployments
    features:
      - "Drift detection for compliance"
      - "Rolling updates"
      - "Canary deployments"

# =============================================================================
# FEATURE FLAGS
# =============================================================================
features:
  multiNode: true
  cloudProviders: true  # For hybrid setups
  vpnOverlay: true
  gpuSupport: false
  highAvailability: true
  dockerSwarm: true
  kubernetes: false  # v1.1+ as separate StackKit
  gitops: false      # Dokploy-based deployments
  multiSite: true

# =============================================================================
# DOCKER SWARM HA CONFIGURATION
# =============================================================================
swarm:
  mode: "ha"  # "single-manager" | "ha" (3+ managers)
  managers:
    count: 3  # Minimum for HA quorum
    electPolicy: "spread"  # Spread across availability zones
  workers:
    count: 0  # Optional, can be scaled later
  network:
    driver: "overlay"
    encrypted: true
  ingress:
    mode: "routing-mesh"  # Built-in Swarm routing

# =============================================================================
# VARIANTS (Service Set Choices)
# =============================================================================
variants:
  # Default: Docker Swarm HA with Dokploy
  default:
    name: "Standard HA"
    description: "3 Swarm managers + Dokploy + HA monitoring"
    services:
      - docker-swarm-ha
      - dokploy             # Swarm mode enabled
      - traefik-ha          # Deployed as global service
      - prometheus-ha       # With remote-write for federation
      - grafana
      - loki
      - uptime-kuma-ha
      - gluster-fs          # Shared storage for HA
      - keepalived          # VIP failover

  # Minimal: Basic HA without full observability
  minimal:
    name: "Minimal HA"
    description: "3 Swarm managers + Dokploy + basic monitoring"
    services:
      - docker-swarm-ha
      - dokploy
      - traefik-ha
      - uptime-kuma-ha

  # Beszel: Alternative monitoring with Beszel
  beszel:
    name: "Beszel HA"
    description: "3 Swarm managers + Dokploy + Beszel monitoring"
    services:
      - docker-swarm-ha
      - dokploy
      - traefik-ha
      - beszel-hub
      - beszel-agents

# =============================================================================
# HA-SPECIFIC SERVICE DEFINITIONS
# =============================================================================
services:
  - name: docker-swarm-ha
    required: true
    description: "Docker Swarm with 3+ manager nodes for HA quorum"
    status: planned
    replicas: null  # Not a replicated service, cluster configuration
    
  - name: dokploy
    required: true
    description: "Dokploy PaaS with Swarm mode enabled"
    status: available
    replicas: 1  # Single instance, failover via Swarm
    swarmMode: true
    
  - name: traefik-ha
    required: true
    description: "Traefik deployed as global service (one per node)"
    status: planned
    deploy:
      mode: global
      constraints:
        - "node.role == manager"
        
  - name: prometheus-ha
    required: false
    description: "Prometheus with HA configuration (2 replicas)"
    status: planned
    replicas: 2
    
  - name: gluster-fs
    required: false
    description: "GlusterFS for shared persistent storage"
    status: planned
    replicas: 3
    
  - name: keepalived
    required: false
    description: "Virtual IP failover between manager nodes"
    status: planned
    deploy:
      mode: global
      constraints:
        - "node.role == manager"

# =============================================================================
# OUTPUTS
# =============================================================================
outputs:
  format: "markdown"
  include:
    - serviceUrls
    - swarmJoinToken
    - clusterHealth
    - nodeStatus
    - backupStatus

# =============================================================================
# PLANNED: KUBERNETES MIGRATION (v1.1+)
# =============================================================================
# Kubernetes support will be available as separate StackKits:
#   - k3s-homelab: Single-node k3s for learning
#   - k8s-cluster: Multi-node k3s HA cluster
#
# This allows users who need Kubernetes to migrate to those StackKits
# while keeping ha-kit simple and Docker-focused.

# =============================================================================
# CHANGELOG
# =============================================================================
changelog:
  - version: "1.0.0-alpha"
    date: "2026-01-15"
    changes:
      - "BREAKING: Switched from Kubernetes (k3s) to Docker Swarm HA"
      - "Added Dokploy with Swarm mode support"
      - "Updated variants for Docker-based HA"
      - "Added GlusterFS for shared storage"
      - "Added Keepalived for VIP failover"
      - "Kubernetes moved to v1.1+ roadmap as separate StackKits"
      
  - version: "0.1.0-alpha"
    date: "2025-01-27"
    changes:
      - "Initial scaffolding"
      - "HA architecture planning (originally k3s-based)"
