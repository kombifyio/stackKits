# =============================================================================
# Tailscale Client - VPN Overlay Add-On
# =============================================================================
# Connect this node to the VPN mesh. Works with both:
#   - Self-hosted Headscale server
#   - Tailscale.com cloud coordination
#
# This runs as a sidecar container and provides:
#   - VPN tunnel to all mesh nodes
#   - MagicDNS for service discovery
#   - (Optional) Exit node capabilities
#   - (Optional) Subnet routing
#
# Usage with Headscale:
#   1. Create auth key: headscale preauthkeys create --user default
#   2. Set TS_AUTHKEY in .env
#   3. Set TS_LOGIN_SERVER to your Headscale URL
#
# Usage with Tailscale.com:
#   1. Create auth key in admin console
#   2. Set TS_AUTHKEY in .env
#   3. Leave TS_LOGIN_SERVER empty
#
# Generated by: kombify stack generate --include-addons
# =============================================================================

services:
  tailscale:
    image: tailscale/tailscale:${TAILSCALE_VERSION:-stable}
    container_name: tailscale
    hostname: ${TAILSCALE_HOSTNAME:-${HOSTNAME}}
    restart: unless-stopped
    
    # Required capabilities for VPN
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_MODULE
    
    # For kernel wireguard
    devices:
      - /dev/net/tun:/dev/net/tun
    
    environment:
      # Auth key (required for unattended operation)
      - TS_AUTHKEY=${TS_AUTHKEY}
      
      # Login server (empty for Tailscale.com, URL for Headscale)
      - TS_LOGIN_SERVER=${TS_LOGIN_SERVER:-}
      
      # State directory
      - TS_STATE_DIR=/var/lib/tailscale
      
      # Accept DNS from coordination server
      - TS_ACCEPT_DNS=${TS_ACCEPT_DNS:-true}
      
      # Userspace networking (set to true for containerized environments)
      - TS_USERSPACE=${TS_USERSPACE:-false}
      
      # Additional tailscale up arguments
      - TS_EXTRA_ARGS=${TS_EXTRA_ARGS:-}
      
      # Advertise routes (comma-separated CIDRs)
      - TS_ROUTES=${TS_ROUTES:-}
      
      # Accept routes from other nodes
      - TS_ACCEPT_ROUTES=${TS_ACCEPT_ROUTES:-true}
      
      # Exit node mode
      - TS_EXIT_NODE=${TS_EXIT_NODE:-false}
      
      # Hostname suffix
      - TS_HOSTNAME=${TAILSCALE_HOSTNAME:-${HOSTNAME}}
      
      # Tags (Tailscale ACL tags)
      - TS_TAGS=${TS_TAGS:-}
    
    volumes:
      - tailscale_state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    
    # Sysctl settings for IP forwarding (needed for subnet routing)
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1
    
    networks:
      - vpn
      - internal
    
    healthcheck:
      test: ["CMD", "tailscale", "status", "--json"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    
    labels:
      # Monitoring
      - "prometheus.io/scrape=false"
      
      # Homepage
      - "homepage.group=Network"
      - "homepage.name=Tailscale"
      - "homepage.icon=tailscale.png"
      - "homepage.description=VPN Mesh Client"
      
      # kombify metadata
      - "kombify.addon=vpn-overlay"
      - "kombify.layer=network"

  # =============================================================================
  # Service proxy - Route traffic from VPN to local services
  # =============================================================================
  # This container allows other VPN nodes to access local services
  # via the Tailscale IP address.
  #
  # Example: Access Grafana at http://node1.tailnet:3000
  #
  vpn-proxy:
    image: nginx:alpine
    container_name: vpn-proxy
    restart: unless-stopped
    profiles:
      - proxy  # Only start with --profile proxy
    
    network_mode: "service:tailscale"
    
    volumes:
      - ./vpn-proxy.conf:/etc/nginx/nginx.conf:ro
    
    depends_on:
      tailscale:
        condition: service_healthy

volumes:
  tailscale_state:
    name: tailscale_state

networks:
  vpn:
    name: vpn_overlay
    driver: bridge
  internal:
    external: true
    name: ${INTERNAL_NETWORK:-traefik_internal}
