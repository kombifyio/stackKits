# StackKits Website Deploy
# Deploys StackKits documentation website to Azure Container Apps

name: Deploy Website

on:
  push:
    branches: [main, dev0.1]
    paths:
      - 'website-v2/**'
      - 'docs/**'
      - '.github/workflows/deploy-website.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  deploy:
    if: github.ref_name == 'main' || github.ref_name == 'dev0.1'
    uses: KombiverseLabs/.github/.github/workflows/kombify-deploy.yml@main
    with:
      service-name: stackkits-web
      image-name: stackkits-web
      dockerfile: website-v2/Dockerfile
      docker-context: website-v2
      container-app-name: ${{ github.ref_name == 'main' && 'ca-stackkits-web-prod' || 'ca-stackkits-web-test' }}
      resource-group: rg-kombify-prod
      container-app-env: cae-kombify-prod
      min-replicas: 1
      max-replicas: 2
      cpu: '0.5'
      memory: '1Gi'
      target-port: 80
      health-endpoint: /
      expected-content-type: text/html
      expected-content: kombify StackKits
    secrets: inherit
