# =============================================================================
# StackKit E2E Development Environment
# =============================================================================
# 3-Layer Architecture:
#   Layer 1 (Foundation): SSH, Identity, Base Security
#   Layer 2 (Platform):   Docker, Traefik Reverse Proxy
#   Layer 3 (StackKit):   Applications (Dokploy, Kuma, Whoami)
#
# Port Exposure:
#   - Only Traefik ports are exposed: 80, 443, 8080
#   - All services route through Traefik using Host headers
#
# Usage:
#   docker compose up -d vm           # Start VM with Layer 2+3
#   docker compose run --rm cli       # Run CLI commands
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # VM Service: Docker-in-Docker for testing
  # ---------------------------------------------------------------------------
  vm:
    build:
      context: ./dev/vm
      dockerfile: Dockerfile
    container_name: stackkits-vm
    privileged: true
    environment:
      DOCKER_TLS_CERTDIR: ""
    ports:
      # SSH access
      - "2222:22"
      # Docker daemon (TCP)
      - "2375:2375"
      # Layer 2: Traefik reverse proxy (ONLY exposed ports)
      - "80:80"        # HTTP
      - "443:443"      # HTTPS
      - "8080:8080"    # Traefik dashboard
      # NO direct service ports - all via Traefik routing:
      # dokploy:3000 -> traefik:80 + Host: dokploy.stack.local
      # kuma:3001 -> traefik:80 + Host: kuma.stack.local
      # whoami:80 -> traefik:80 + Host: whoami.stack.local
    volumes:
      # VM Docker data
      - vm_docker:/var/lib/docker
      # Layer 1: Identity data
      - tinyauth_data:/data/tinyauth
      # Layer 2: Platform data
      - traefik_data:/data/traefik
      - traefik_certs:/data/traefik-certs
      # Layer 3: Application data
      - dokploy_data:/data/dokploy
      - dokploy_postgres_data:/data/dokploy-postgres
      - kuma_data:/data/kuma
      # SSH keys
      - ./dev/vm/authorized_keys:/authorized_keys:ro
      # Source code for development
      - .:/workspace:rw
    healthcheck:
      test: ["CMD", "docker", "info"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    networks:
      stackkits-net:
        aliases:
          - dokploy.stack.local
          - kuma.stack.local
          - whoami.stack.local
          - auth.stack.local
          - traefik.stack.local
    dns:
      - 127.0.0.11
    dns_search:
      - stack.local

  # ---------------------------------------------------------------------------
  # DNS Service: Local DNS for .stack.local domains
  # ---------------------------------------------------------------------------
  dns:
    image: jpillora/dnsmasq:latest
    container_name: stackkits-dns
    ports:
      - "53:53/udp"
      - "53:53/tcp"
    environment:
      DNSMASQ_OPTS: |
        --address=/stack.local/172.30.0.10
        --address=/dokploy.stack.local/172.30.0.10
        --address=/kuma.stack.local/172.30.0.10
        --address=/whoami.stack.local/172.30.0.10
        --address=/auth.stack.local/172.30.0.10
        --address=/traefik.stack.local/172.30.0.10
        --listen-address=0.0.0.0
    networks:
      stackkits-net:
        ipv4_address: 172.30.0.53
    cap_add:
      - NET_ADMIN
    profiles:
      - dns

  # ---------------------------------------------------------------------------
  # StackKit CLI Service
  # ---------------------------------------------------------------------------
  cli:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stackkits-cli
    environment:
      DOCKER_HOST: tcp://vm:2375
      STACKKIT_BIN: stackkit
      # All services route through Traefik on port 80
      DOMAIN: "stack.local"
      TRAEFIK_URL: "http://traefik.stack.local"
      AUTH_URL: "http://auth.stack.local"
      DOKPLOY_URL: "http://dokploy.stack.local"
      KUMA_URL: "http://kuma.stack.local"
      WHOAMI_URL: "http://whoami.stack.local"
    volumes:
      - .:/workspace:rw
      - ./dev/vm/authorized_keys:/root/.ssh/authorized_keys:ro
    working_dir: /workspace
    command: ["tail", "-f", "/dev/null"]
    depends_on:
      vm:
        condition: service_healthy
    networks:
      stackkits-net:
        aliases:
          - dokploy.stack.local
          - kuma.stack.local
          - whoami.stack.local
          - auth.stack.local
          - traefik.stack.local
    dns:
      - 172.30.0.53
    dns_search:
      - stack.local
    profiles:
      - cli

  # ---------------------------------------------------------------------------
  # E2E Test Runner Service
  # ---------------------------------------------------------------------------
  e2e:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stackkits-e2e
    environment:
      DOCKER_HOST: tcp://vm:2375
      STACKKIT_BIN: stackkit
      TIMEOUT: "300"
      TEST_PERSISTENCE: "true"
      TEST_SECURITY: "true"
      DOMAIN: "stack.local"
      TRAEFIK_URL: "http://traefik.stack.local"
      AUTH_URL: "http://auth.stack.local"
      DOKPLOY_URL: "http://dokploy.stack.local"
      KUMA_URL: "http://kuma.stack.local"
      WHOAMI_URL: "http://whoami.stack.local"
    volumes:
      - .:/workspace:rw
      # Mount persistent volumes for persistence testing
      - dokploy_data:/data/dokploy:rw
      - dokploy_postgres_data:/data/dokploy-postgres:rw
      - kuma_data:/data/kuma:rw
      - traefik_certs:/data/traefik-certs:rw
      - tinyauth_data:/data/tinyauth:rw
    working_dir: /workspace
    command: ["./dev-homelab/tests/e2e_test.sh"]
    depends_on:
      vm:
        condition: service_healthy
      dns:
        condition: service_started
    networks:
      stackkits-net:
        aliases:
          - dokploy.stack.local
          - kuma.stack.local
          - whoami.stack.local
          - auth.stack.local
          - traefik.stack.local
    dns:
      - 172.30.0.53
    dns_search:
      - stack.local
    profiles:
      - e2e

# =============================================================================
# PERSISTENT VOLUMES - Organized by Layer
# =============================================================================

volumes:
  # VM Docker data
  vm_docker:
    driver: local

  # Layer 1: Foundation (Identity)
  tinyauth_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/.data/tinyauth

  # Layer 2: Platform (Traefik)
  traefik_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/.data/traefik

  traefik_certs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/.data/traefik-certs

  # Layer 3: StackKit (Applications)
  dokploy_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/.data/dokploy

  dokploy_postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/.data/dokploy-postgres

  kuma_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/.data/kuma

# =============================================================================
# NETWORKS
# =============================================================================

networks:
  stackkits-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/16
          gateway: 172.30.0.1
