# =============================================================================
# Headscale Configuration - VPN Overlay Add-On
# =============================================================================
# Configuration file for Headscale coordination server.
# Mount this to /etc/headscale/config.yaml
#
# Variables:
#   ${HEADSCALE_URL} - Public URL for Headscale server
#   ${DOMAIN} - Base domain for services
#
# Generated by: kombify stack generate --include-addons
# =============================================================================

# Server URL that clients will connect to
server_url: https://hs.${DOMAIN}

# Address to listen to
listen_addr: 0.0.0.0:443

# Address to listen to for gRPC
grpc_listen_addr: 0.0.0.0:50443

# Enable gRPC for CLI and API access
grpc_allow_insecure: false

# Address for metrics (Prometheus)
metrics_listen_addr: 0.0.0.0:9090

# Noise (recommended) - Protocol for communication
noise:
  private_key_path: /var/lib/headscale/noise_private.key

# IP prefixes for the VPN
prefixes:
  v4: 100.64.0.0/10
  v6: fd7a:115c:a1e0::/48

# DERP (relay) configuration
derp:
  server:
    enabled: true
    region_id: 999
    region_code: "homelab"
    region_name: "Homelab"
    stun_listen_addr: "0.0.0.0:3478"
  
  # Use public DERP servers as fallback
  urls:
    - https://controlplane.tailscale.com/derpmap/default
  
  paths: []
  auto_update_enabled: true
  update_frequency: 24h

# Ephemeral node settings
ephemeral_node_inactivity_timeout: 30m

# Database configuration
database:
  # SQLite for simple setups
  type: sqlite
  sqlite:
    path: /var/lib/headscale/db.sqlite
  
  # PostgreSQL for HA setups (uncomment to use)
  # type: postgres
  # postgres:
  #   host: ${POSTGRES_HOST:-postgres}
  #   port: 5432
  #   name: headscale
  #   user: headscale
  #   pass: ${POSTGRES_PASSWORD}
  #   max_open_conns: 10
  #   max_idle_conns: 5
  #   conn_max_idle_time_secs: 3600

# DNS configuration
dns:
  magic_dns: true
  base_domain: homelab.local
  
  nameservers:
    global:
      - 1.1.1.1
      - 8.8.8.8
  
  # Override per-namespace
  search_domains: []
  
  # Extra DNS records
  extra_records: []
  #   - name: "grafana.homelab.local"
  #     type: "A"
  #     value: "100.64.0.10"

# Unix socket for CLI communication
unix_socket: /var/run/headscale/headscale.sock
unix_socket_permission: "0770"

# Disable TLS when behind reverse proxy (Traefik handles TLS)
tls_letsencrypt_hostname: ""
tls_letsencrypt_cache_dir: ""
tls_letsencrypt_challenge_type: ""
tls_letsencrypt_listen: ""

# Use custom TLS or no TLS (reverse proxy handles it)
tls_cert_path: ""
tls_key_path: ""

# Logging
log:
  format: text
  level: info

# ACL (Access Control List) - commented out for default allow
# acl_policy_path: /etc/headscale/acl.hujson

# OIDC authentication (optional)
# oidc:
#   only_start_if_oidc_is_available: true
#   issuer: "https://auth.${DOMAIN}/realms/homelab"
#   client_id: "headscale"
#   client_secret_path: /var/run/secrets/headscale/oidc_client_secret
#   scope:
#     - openid
#     - profile
#     - email
#   extra_params:
#     domain_hint: example.com
#   allowed_domains:
#     - ${DOMAIN}
#   allowed_groups: []
#   allowed_users: []
#   strip_email_domain: true

# CLI configuration
cli:
  timeout: 5s
  insecure: false

# Enable verbose policy logging
policy:
  mode: file
  # path: /etc/headscale/acl.hujson
