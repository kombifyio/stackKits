# StackKits Website - Docker Compose Configuration
services:
  stackkits-website:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stackkits-website
    ports:
      - "8080:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "com.stackkits.description=StackKits Marketing Website"
