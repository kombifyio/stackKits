name: Generate CUE from Database

on:
  # Manual trigger
  workflow_dispatch:
    inputs:
      target:
        description: 'Generation target'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - validation-rules
          - settings

  # Trigger on changes to database schema or seed
  push:
    branches:
      - main
      - dev0.1
    paths:
      - 'kombify-admin/prisma/schema.prisma'
      - 'kombify-admin/prisma/seed.ts'

  # Allow other workflows to trigger this one
  workflow_call:
    inputs:
      target:
        description: 'Generation target'
        required: false
        default: 'all'
        type: string

env:
  DATABASE_URL: postgresql://kombify:kombify_dev@localhost:5432/kombify_admin

jobs:
  generate:
    name: Generate CUE Files
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: kombify
          POSTGRES_PASSWORD: kombify_dev
          POSTGRES_DB: kombify_admin
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: kombify-admin
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        working-directory: kombify-admin
        run: bunx prisma generate

      - name: Push database schema
        working-directory: kombify-admin
        run: bunx prisma db push

      - name: Seed database
        working-directory: kombify-admin
        run: bunx prisma db seed

      - name: Generate CUE files
        working-directory: kombify-admin
        run: |
          TARGET="${{ inputs.target || 'all' }}"
          echo "Generating CUE files (target: $TARGET)"
          bunx ts-node scripts/generate-cue.ts "$TARGET"

      - name: Setup CUE
        uses: cue-lang/setup-cue@v1.0.0
        with:
          version: 'latest'

      - name: Validate generated CUE
        run: |
          echo "Validating generated CUE files..."
          cue vet ./base/generated/...
          echo "Validation passed!"

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet base/generated/ || echo "changes=true" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        if: steps.changes.outputs.changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add base/generated/
          git commit -m "chore: regenerate CUE files from database

          Auto-generated by GitHub Actions workflow.
          Trigger: ${{ github.event_name }}
          Target: ${{ inputs.target || 'all' }}

          Co-Authored-By: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          git push

      - name: Summary
        run: |
          echo "## CUE Generation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Target | ${{ inputs.target || 'all' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trigger | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Changes | ${{ steps.changes.outputs.changes || 'false' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Generated Files" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          ls -la base/generated/ >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
