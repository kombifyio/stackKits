# Traefik dynamic configuration for Base Kit Demo
# Routes all 7 user-facing services through Traefik

http:
  routers:
    # Auth services (no ForwardAuth — they ARE the auth)
    tinyauth:
      rule: "Host(`auth.demo.local`)"
      entryPoints: [web]
      service: tinyauth

    pocketid:
      rule: "Host(`id.demo.local`)"
      entryPoints: [web]
      service: pocketid

    # Protected services (ForwardAuth via TinyAuth)
    dokploy:
      rule: "Host(`dokploy.demo.local`)"
      entryPoints: [web]
      service: dokploy
      middlewares: [tinyauth-forward]

    dashboard:
      rule: "Host(`base.demo.local`)"
      entryPoints: [web]
      service: dashboard
      middlewares: [tinyauth-forward]

    kuma:
      rule: "Host(`kuma.demo.local`)"
      entryPoints: [web]
      service: kuma
      middlewares: [tinyauth-forward]

    whoami:
      rule: "Host(`whoami.demo.local`)"
      entryPoints: [web]
      service: whoami
      middlewares: [tinyauth-forward]

    traefik-dashboard:
      rule: "Host(`traefik.demo.local`)"
      entryPoints: [web]
      service: traefik-api
      middlewares: [tinyauth-forward]

  services:
    tinyauth:
      loadBalancer:
        servers:
          - url: "http://tinyauth:3000"

    pocketid:
      loadBalancer:
        servers:
          - url: "http://pocketid:1411"

    dokploy:
      loadBalancer:
        servers:
          - url: "http://dokploy:3000"

    dashboard:
      loadBalancer:
        servers:
          - url: "http://dashboard:80"

    kuma:
      loadBalancer:
        servers:
          - url: "http://kuma:3001"

    whoami:
      loadBalancer:
        servers:
          - url: "http://whoami:80"

    traefik-api:
      loadBalancer:
        servers:
          - url: "http://traefik:8080"

  middlewares:
    tinyauth-forward:
      forwardAuth:
        address: "http://tinyauth:3000/api/auth/traefik"
        trustForwardHeader: true
        authResponseHeaders:
          - remote-user
          - remote-sub
          - remote-name
          - remote-email
          - remote-groups
