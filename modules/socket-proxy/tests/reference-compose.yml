# Socket Proxy Module Reference Compose
# Purpose: Validate socket proxy filters Docker API correctly
# Usage:
#   docker compose -f modules/socket-proxy/tests/reference-compose.yml up -d
#   ./modules/socket-proxy/tests/integration_test.sh
#
# Architecture:
#   socket-proxy (mounts docker.sock) <-- socket-proxy-net --> traefik (no docker.sock)
#   Traefik uses DOCKER_HOST=tcp://socket-proxy:2375 for service discovery.

services:
  socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: test-socket-proxy
    restart: unless-stopped
    environment:
      CONTAINERS: 1
      NETWORKS: 1
      SERVICES: 1
      TASKS: 1
      INFO: 1
      POST: 0
      BUILD: 0
      COMMIT: 0
      CONFIGS: 0
      DISTRIBUTION: 0
      EXEC: 0
      GRPC: 0
      IMAGES: 0
      NODES: 0
      PLUGINS: 0
      SECRETS: 0
      SESSION: 0
      SWARM: 0
      SYSTEM: 0
      VOLUMES: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - socket-proxy-net
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /run
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:2375/version || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  traefik:
    image: traefik:v3.3
    container_name: test-traefik-socketproxy
    command:
      - "--api.insecure=true"
      - "--ping=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.endpoint=tcp://socket-proxy:2375"
      - "--entrypoints.web.address=:80"
    ports:
      - "8895:80"
      - "19095:8080"
    # NO docker.sock volume mount — uses socket-proxy instead
    depends_on:
      socket-proxy:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "traefik", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - socket-proxy-net
      - test-net

  whoami:
    image: traefik/whoami:latest
    container_name: test-whoami-socketproxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.whoami.rule=Host(`whoami.test.local`)"
      - "traefik.http.routers.whoami.entrypoints=web"
      - "traefik.http.services.whoami.loadbalancer.server.port=80"
    networks:
      - test-net

networks:
  socket-proxy-net:
    driver: bridge
    internal: true
  test-net:
    driver: bridge
