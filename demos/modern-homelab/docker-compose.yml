# =============================================================================
# Modern Homelab Demo — Hybrid Cloud+Local (2-Node Simulation, self-contained)
# =============================================================================
#
# Simulates the modern-homelab architecture:
#   Cloud node: Traefik, TinyAuth, PocketID, Dokploy, Dozzle, Uptime Kuma
#   Local node: Application workloads (nginx app, whoami)
#
# Usage:
#   docker compose -f demos/modern-homelab/docker-compose.yml up -d
#
# Ports:
#   7980  — HTTP (Traefik entrypoint)
#   7190  — Traefik Dashboard/API
#
# Credentials:
#   TinyAuth: admin / admin123
#
# Domains (kombify.me → auto-resolves to 127.0.0.1, no /etc/hosts needed):
#   auth.kombify.me:7980       — TinyAuth login
#   id.kombify.me:7980         — PocketID (OIDC)
#   dokploy.kombify.me:7980    — Dokploy PaaS
#   logs.kombify.me:7980       — Dozzle (live logs)
#   status.kombify.me:7980     — Uptime Kuma
#   proxy.kombify.me:7980      — Traefik dashboard
#   dash.kombify.me:7980       — Dashboard hub
#   app.kombify.me:7980        — Local app (nginx)
#   whoami.kombify.me:7980     — Local whoami
#
# Key Differences from Base Kit:
#   - 2-node hybrid topology (cloud_net + local_net)
#   - Dozzle for real-time log aggregation
#   - Local workloads routed through cloud Traefik
#   - Identity-aware proxy (no VPN required)
# =============================================================================

services:
  # ===========================================================================
  # CLOUD NODE — Public-facing management services
  # ===========================================================================

  # Layer 2: Traefik — Cloud Entry Point (inline dynamic config)
  traefik:
    image: traefik:v3.3
    container_name: modern-traefik
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mkdir -p /etc/traefik
        cat > /etc/traefik/dynamic.yml << 'DYNAMIC'
        http:
          routers:
            tinyauth:
              rule: "Host(`auth.kombify.me`)"
              entryPoints: [web]
              service: tinyauth
            pocketid:
              rule: "Host(`id.kombify.me`)"
              entryPoints: [web]
              service: pocketid
            dokploy:
              rule: "Host(`dokploy.kombify.me`)"
              entryPoints: [web]
              service: dokploy
              middlewares: [tinyauth-forward]
            dozzle:
              rule: "Host(`logs.kombify.me`)"
              entryPoints: [web]
              service: dozzle
              middlewares: [tinyauth-forward]
            kuma:
              rule: "Host(`status.kombify.me`)"
              entryPoints: [web]
              service: kuma
              middlewares: [tinyauth-forward]
            traefik-dashboard:
              rule: "Host(`proxy.kombify.me`)"
              entryPoints: [web]
              service: traefik-api
              middlewares: [tinyauth-forward]
            dashboard:
              rule: "Host(`dash.kombify.me`)"
              entryPoints: [web]
              service: dashboard
              middlewares: [tinyauth-forward]
            local-app:
              rule: "Host(`app.kombify.me`)"
              entryPoints: [web]
              service: local-app
              middlewares: [tinyauth-forward]
            local-whoami:
              rule: "Host(`whoami.kombify.me`)"
              entryPoints: [web]
              service: local-whoami
              middlewares: [tinyauth-forward]
          services:
            tinyauth:
              loadBalancer:
                servers:
                  - url: "http://tinyauth:3000"
            pocketid:
              loadBalancer:
                servers:
                  - url: "http://pocketid:1411"
            dokploy:
              loadBalancer:
                servers:
                  - url: "http://dokploy:3000"
            dozzle:
              loadBalancer:
                servers:
                  - url: "http://dozzle:8080"
            kuma:
              loadBalancer:
                servers:
                  - url: "http://kuma:3001"
            traefik-api:
              loadBalancer:
                servers:
                  - url: "http://traefik:8080"
            dashboard:
              loadBalancer:
                servers:
                  - url: "http://dashboard:80"
            local-app:
              loadBalancer:
                servers:
                  - url: "http://local-nginx:80"
            local-whoami:
              loadBalancer:
                servers:
                  - url: "http://local-whoami:80"
          middlewares:
            tinyauth-forward:
              forwardAuth:
                address: "http://tinyauth:3000/api/auth/traefik"
                trustForwardHeader: true
                authResponseHeaders:
                  - remote-user
                  - remote-sub
                  - remote-name
                  - remote-email
                  - remote-groups
        DYNAMIC
        exec traefik \
          --api.insecure=true \
          --ping=true \
          --entrypoints.web.address=:80 \
          --providers.file.filename=/etc/traefik/dynamic.yml \
          --providers.file.watch=true \
          --log.level=ERROR
    ports:
      - "7980:80"
      - "7190:8080"
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - cloud_net
      - local_net

  # Layer 2: TinyAuth — ForwardAuth
  tinyauth:
    image: ghcr.io/steveiliop56/tinyauth:v4
    container_name: modern-tinyauth
    restart: unless-stopped
    environment:
      - TZ=Europe/Berlin
      - APP_URL=http://auth.kombify.me:7980
      - "USERS=admin:$$2b$$12$$Osp9VbUj1xvhgmOeVlB/rOuayl4w0DvseE8W0O.J1m6WdVLV8EQbO"
      - SECURE_COOKIE=false
      - SESSION_EXPIRY=86400
    volumes:
      - tinyauth-data:/data
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "tinyauth", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      traefik:
        condition: service_healthy
    networks:
      - cloud_net

  # Layer 2: PocketID — OIDC Provider
  pocketid:
    image: ghcr.io/pocket-id/pocket-id:v2
    container_name: modern-pocketid
    restart: unless-stopped
    environment:
      - TZ=Europe/Berlin
      - APP_URL=http://id.kombify.me:7980
      - TRUST_PROXY=true
      - PORT=1411
      - ENCRYPTION_KEY=modern-kit-encryption-key-2026
    volumes:
      - pocketid-data:/app/data
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "/app/pocket-id", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    depends_on:
      traefik:
        condition: service_healthy
    networks:
      - cloud_net

  # Layer 2: Dokploy — PaaS Platform (cloud node)
  dokploy-postgres:
    image: postgres:16-alpine
    container_name: modern-dokploy-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=dokploy
      - POSTGRES_PASSWORD=modern-dokploy-pass-2026
      - POSTGRES_DB=dokploy
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - dokploy-postgres-data:/var/lib/postgresql/data
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dokploy -d dokploy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - cloud_db

  dokploy-redis:
    image: redis:7-alpine
    container_name: modern-dokploy-redis
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - cloud_db

  dokploy:
    image: dokploy/dokploy:latest
    container_name: modern-dokploy
    restart: unless-stopped
    user: "0:0"
    environment:
      - DATABASE_URL=postgresql://dokploy:modern-dokploy-pass-2026@dokploy-postgres:5432/dokploy
      - REDIS_URL=redis://dokploy-redis:6379
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - dokploy-data:/etc/dokploy
      - /var/run/docker.sock:/var/run/docker.sock
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      dokploy-postgres:
        condition: service_healthy
      dokploy-redis:
        condition: service_healthy
      traefik:
        condition: service_healthy
    networks:
      - cloud_net
      - cloud_db

  # Layer 3: Dozzle — Real-time Docker Log Viewer (MODERN HOMELAB EXCLUSIVE)
  dozzle:
    image: amir20/dozzle:latest
    container_name: modern-dozzle
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    depends_on:
      traefik:
        condition: service_healthy
    networks:
      - cloud_net

  # Layer 3: Uptime Kuma — External Monitoring
  kuma:
    image: louislam/uptime-kuma:1
    container_name: modern-kuma
    restart: unless-stopped
    volumes:
      - kuma-data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const http=require('http');const o={hostname:'localhost',port:3001,path:'/api/status-page/heartbeat/demo',timeout:2000};const r=http.request(o,res=>{process.exit(res.statusCode===200?0:1)});r.on('error',()=>process.exit(1));r.end()\"||exit 0"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      traefik:
        condition: service_healthy
    networks:
      - cloud_net

  # Layer 3: Dashboard — Service Hub
  dashboard:
    image: nginx:alpine
    container_name: modern-dashboard
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        cat > /usr/share/nginx/html/index.html << 'DASHBOARD'
        <!DOCTYPE html>
        <html><head><meta charset="utf-8"><title>kombify Modern Homelab</title>
        <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:system-ui,-apple-system,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center}
        .container{max-width:900px;width:100%;padding:2rem}
        h1{font-size:2rem;margin-bottom:.5rem;background:linear-gradient(135deg,#06b6d4,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .subtitle{color:#94a3b8;margin-bottom:2rem}
        .section{margin-bottom:1.5rem}
        .section h2{font-size:.85rem;text-transform:uppercase;color:#64748b;letter-spacing:.1em;margin-bottom:.75rem;padding-left:.25rem}
        .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:.75rem}
        .card{background:#1e293b;border:1px solid #334155;border-radius:.75rem;padding:1rem;text-decoration:none;color:#e2e8f0;transition:all .2s}
        .card:hover{border-color:#06b6d4;transform:translateY(-2px);box-shadow:0 4px 12px rgba(6,182,212,.2)}
        .card h3{font-size:.9rem;margin-bottom:.2rem}
        .card p{font-size:.75rem;color:#94a3b8}
        .badge{display:inline-block;font-size:.6rem;padding:.1rem .35rem;border-radius:.2rem;margin-bottom:.4rem}
        .cloud{background:#164e63;color:#22d3ee}
        .local{background:#1e3a2f;color:#4ade80}
        .auth{background:#3b1e5f;color:#c084fc}
        footer{text-align:center;margin-top:2rem;color:#475569;font-size:.75rem}
        .topology{display:flex;gap:1rem;margin-bottom:1.5rem;padding:1rem;background:#1e293b;border-radius:.75rem;border:1px solid #334155}
        .topo-node{flex:1;padding:.75rem;border-radius:.5rem;text-align:center}
        .topo-cloud{background:#0c4a6e;border:1px solid #0891b2}
        .topo-local{background:#14532d;border:1px solid #22c55e}
        .topo-node h4{font-size:.8rem;margin-bottom:.25rem}
        .topo-node p{font-size:.65rem;color:#94a3b8}
        </style></head><body>
        <div class="container">
        <h1>kombify Modern Homelab</h1>
        <p class="subtitle">Hybrid cloud+local — 2-node topology</p>
        <div class="topology">
        <div class="topo-node topo-cloud"><h4>Cloud Node</h4><p>Traefik, Auth, PaaS, Monitoring</p></div>
        <div class="topo-node topo-local"><h4>Local Node</h4><p>Workloads, Compute, Storage</p></div>
        </div>
        <div class="section"><h2>Cloud Node Services</h2>
        <div class="grid">
        <a class="card" href="http://auth.kombify.me:7980"><span class="badge auth">Auth</span><h3>TinyAuth</h3><p>ForwardAuth Proxy</p></a>
        <a class="card" href="http://id.kombify.me:7980"><span class="badge auth">Auth</span><h3>PocketID</h3><p>OIDC Provider</p></a>
        <a class="card" href="http://dokploy.kombify.me:7980"><span class="badge cloud">Cloud</span><h3>Dokploy</h3><p>PaaS Platform</p></a>
        <a class="card" href="http://logs.kombify.me:7980"><span class="badge cloud">Cloud</span><h3>Dozzle</h3><p>Live Logs</p></a>
        <a class="card" href="http://status.kombify.me:7980"><span class="badge cloud">Cloud</span><h3>Uptime Kuma</h3><p>Status Monitor</p></a>
        <a class="card" href="http://proxy.kombify.me:7980"><span class="badge cloud">Cloud</span><h3>Traefik</h3><p>Reverse Proxy</p></a>
        </div></div>
        <div class="section"><h2>Local Node Services</h2>
        <div class="grid">
        <a class="card" href="http://app.kombify.me:7980"><span class="badge local">Local</span><h3>App Server</h3><p>Sample Workload</p></a>
        <a class="card" href="http://whoami.kombify.me:7980"><span class="badge local">Local</span><h3>Whoami</h3><p>Network Diagnostic</p></a>
        </div></div>
        <footer>kombify StackKits &mdash; Modern Homelab Demo (hybrid topology)</footer>
        </div></body></html>
        DASHBOARD
        nginx -g "daemon off;"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    depends_on:
      traefik:
        condition: service_healthy
    networks:
      - cloud_net

  # ===========================================================================
  # LOCAL NODE — Compute and storage workloads
  # ===========================================================================

  # Simulated local application (nginx serving a page)
  local-nginx:
    image: nginx:alpine
    container_name: modern-local-app
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        cat > /usr/share/nginx/html/index.html << 'APP'
        <!DOCTYPE html>
        <html><head><meta charset="utf-8"><title>Local App</title>
        <style>body{font-family:system-ui;background:#14532d;color:#e2e8f0;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}
        .box{background:#1e293b;padding:2rem;border-radius:1rem;border:2px solid #22c55e;text-align:center;max-width:400px}
        h1{color:#4ade80;margin-bottom:.5rem}p{color:#94a3b8;font-size:.9rem}</style></head>
        <body><div class="box"><h1>Local Node App</h1><p>This service runs on the local node (compute/storage). Traffic routed through cloud Traefik.</p><p style="margin-top:1rem;font-size:.75rem;color:#64748b">Node: local | Network: local_net</p></div></body></html>
        APP
        nginx -g "daemon off;"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - local_net

  # Simulated local whoami (network diagnostic for local node)
  local-whoami:
    image: traefik/whoami:latest
    container_name: modern-local-whoami
    restart: unless-stopped
    networks:
      - local_net

# =============================================================================
# Networks — Simulating hybrid topology
# =============================================================================
networks:
  cloud_net:
    name: modern_cloud_net
  local_net:
    name: modern_local_net
  cloud_db:
    name: modern_cloud_db
    internal: true

# =============================================================================
# Volumes
# =============================================================================
volumes:
  tinyauth-data:
  pocketid-data:
  dokploy-data:
  dokploy-postgres-data:
  kuma-data:
