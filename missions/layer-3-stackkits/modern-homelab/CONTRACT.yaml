name: modern-homelab
version: "1.0"
audience: developer

layers:
  foundation: base
  platform: docker

services:
  network:
    - traefik
  platform:
    - coolify
  git:
    - gitea
  cicd:
    woodpecker: default
    drone: alternative
  monitoring:
    - uptime-kuma
    - grafana
    - loki
  utilities:
    - dozzle
    - portainer
  development:
    - code-server
    - registry

variants:
  full: allServices
  lite: excludes grafana, loki, registry

acceptance:
  - services start
  - git push works
  - pipeline triggers
  - app deploys
  - destroy cleans up
