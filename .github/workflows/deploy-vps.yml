name: Deploy to VPS

on:
  workflow_run:
    workflows: ["Build and Push"]
    branches: [main]
    types: [completed]
  workflow_dispatch:
    inputs:
      image-tag:
        description: "Image tag to deploy (defaults to latest)"
        required: false
        type: string
        default: "latest"

concurrency:
  group: deploy-stackkits-vps
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy kombify StackKits
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    uses: KombiverseLabs/.github/.github/workflows/deploy-vps-ssh.yml@main
    with:
      compose-file: deploy/docker-compose.prod.yml
      service-name: kombify-stackkits
      image-tag: ${{ inputs.image-tag || 'latest' }}
      health-check-url: "https://stackkits.kombify.io"
      health-check-path: "/"
      doppler-project: kombify-stackkits
      doppler-config: prd
    secrets:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT }}
      DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
