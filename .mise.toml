# kombify StackKits — CUE-based infrastructure toolkit
# Commands: mise run dev | mise run stage | mise run prod

min_version = "2024.11.1"

[tools]
go = "1.24.1"
node = "22"
"ubi:cue-lang/cue" = "latest"

[env]
PROJECT_NAME = "kombify-stackkits"
GOTOOLCHAIN = "auto"
_.file = [".env", ".env.local"]

# ── Internal Tasks ─────────────────────────────────────────────

[tasks._docker-check]
description = "Verify Docker Desktop is running"
run = 'docker info > /dev/null 2>&1 || (echo "ERROR: Docker Desktop is not running!" && exit 1)'

[tasks._build]
description = "Build CLI + server binaries"
depends = ["_docker-check"]
run = [
  "go mod download",
  "go build -o build/stackkit ./cmd/stackkit",
  "go build -o build/stackkit-server ./cmd/stackkit-server",
]

[tasks._docker-down]
description = "Tear down previous VM (fresh state)"
depends = ["_build"]
run = "docker compose down -v --remove-orphans 2>/dev/null || true"

[tasks._docker-up]
description = "Start VM + orchestrator + portal via Docker Compose"
depends = ["_docker-down"]
run = [
  "docker compose up -d --build vm orchestrator portal",
  "docker compose --profile cli up -d --build --no-deps cli",
]

[tasks._health]
description = "Wait for VM Docker daemon to be healthy"
depends = ["_docker-up"]
run = '''
echo "Waiting for VM Docker daemon..."
timeout=120
elapsed=0
while [ $elapsed -lt $timeout ]; do
  if docker compose exec -T vm docker info > /dev/null 2>&1; then
    echo "VM Docker daemon is ready (${elapsed}s)"
    exit 0
  fi
  sleep 2
  elapsed=$((elapsed+2))
done
echo "ERROR: VM Docker daemon not ready after ${timeout}s"
exit 1
'''

[tasks._test]
description = "Run unit + integration + CUE validation tests"
depends = ["_health"]
run = [
  "go test -v -race -short ./pkg/... ./internal/...",
  "go test -v -race ./tests/integration/...",
  "cue vet ./base/...",
  "cue vet ./base-homelab/...",
  "cue vet ./modern-homelab/...",
]

[tasks._test-vm]
description = "Run comprehensive CLI tests against the VM"
depends = ["_test"]
run = "go test -v -race -timeout=15m -tags=vm ./tests/vm/..."

# ── Test Tasks ────────────────────────────────────────────────

[tasks."test:cue"]
description = "Validate all CUE schemas (base + kits + modules)"
run = '''
echo "=== CUE Validation ==="
cue vet ./base/...
echo "[OK] base/"
cue vet ./base-homelab/...
echo "[OK] base-homelab/"
cue vet ./modern-homelab/... 2>/dev/null && echo "[OK] modern-homelab/" || echo "[SKIP] modern-homelab/"
for dir in modules/*/; do
  if [ -f "$dir/module.cue" ]; then
    # -c=false: allow incomplete values (settings.perma require deploy-time secrets, no defaults)
    cue vet -c=false "./$dir/..." && echo "[OK] $dir" || echo "[FAIL] $dir"
  fi
done
echo "=== CUE Validation Complete ==="
'''

[tasks."test:module"]
description = "Run a single module's integration test (usage: mise run test:module <name>)"
run = '''
MODULE="${1:?Usage: mise run test:module <module-name>}"
SCRIPT="modules/$MODULE/tests/integration_test.sh"
if [ ! -f "$SCRIPT" ]; then
  echo "ERROR: $SCRIPT not found"
  exit 1
fi
echo "=== Testing module: $MODULE ==="
bash "$SCRIPT"
'''

[tasks."test:modules"]
description = "Run ALL module integration tests sequentially"
depends = ["_docker-check"]
run = '''
echo "=== Module Integration Tests ==="
PASS=0
FAIL=0
for dir in modules/*/; do
  MODULE=$(basename "$dir")
  SCRIPT="$dir/tests/integration_test.sh"
  if [ -f "$SCRIPT" ]; then
    echo ""
    echo "--- Module: $MODULE ---"
    if bash "$SCRIPT"; then
      PASS=$((PASS+1))
    else
      FAIL=$((FAIL+1))
      echo "FAILED: $MODULE"
    fi
  fi
done
echo ""
echo "=== Module Tests: $PASS passed, $FAIL failed ==="
[ "$FAIL" -eq 0 ] || exit 1
'''

[tasks."test:compose"]
description = "Run full-stack composition test (all modules together)"
depends = ["_docker-check"]
run = '''
SCRIPT="modules/_integration/integration_test.sh"
if [ ! -f "$SCRIPT" ]; then
  echo "ERROR: $SCRIPT not found. Create it first."
  exit 1
fi
echo "=== Full-Stack Composition Test ==="
bash "$SCRIPT"
'''

[tasks."test:all"]
description = "Run CUE validation + Go tests + module tests (no VM)"
depends = ["_docker-check"]
run = [
  "mise run test:cue",
  "go test -v -race -short ./pkg/... ./internal/...",
  "go test -v -race ./tests/integration/...",
  "mise run test:modules",
]

# ── Public Tasks ──────────────────────────────────────────────

[tasks.dev]
description = "Build, start VM + orchestrator + portal, run all tests"
depends = ["_test-vm"]
run = '''
echo ""
echo "kombify StackKits ready!"
echo "  Orchestrator: http://localhost:9000  (demo management + VM terminal)"
echo "  Portal:       http://localhost:9001  (service links dashboard)"
echo "  VM SSH:       ssh root@localhost -p 2222"
echo "  CLI:          build/stackkit"
'''

[tasks.demo]
description = "Quick start: VM + orchestrator + Base Kit demo (no tests)"
depends = ["_docker-check"]
run = '''
echo "Starting VM + orchestrator + portal..."
docker compose up -d --build vm orchestrator portal
echo "Waiting for VM health..."
timeout=90
elapsed=0
while [ $elapsed -lt $timeout ]; do
  if docker compose exec -T vm docker info > /dev/null 2>&1; then
    echo "VM ready (${elapsed}s). Starting Base Kit demo..."
    break
  fi
  sleep 2
  elapsed=$((elapsed+2))
done
if [ $elapsed -ge $timeout ]; then
  echo "ERROR: VM not ready after ${timeout}s"
  exit 1
fi

curl -sf -X POST http://localhost:9000/api/demos/base-kit/start > /dev/null 2>&1 || \
  docker compose -f demos/base-kit/docker-compose.yml up -d

echo ""
echo "kombify StackKits Demo running!"
echo "  Orchestrator:  http://localhost:9000"
echo "  Portal:        http://localhost:9001"
echo "  Base Kit:      http://dash.kombify.me:7880"
echo "  TinyAuth:      http://auth.kombify.me:7880  (admin / admin123)"
echo ""
echo "  Run tests:     bash demos/base-kit/test.sh"
echo "  Stop:          docker compose down -v"
'''

[tasks.stage]
description = "Deploy to staging (trigger release workflow)"
depends = ["_test"]
run = "gh workflow run release.yml"

[tasks.prod]
description = "Deploy to production (trigger release workflow)"
depends = ["_test"]
run = "gh workflow run release.yml -f environment=production"
