# =============================================================================
# StackKit E2E Development Environment - VM-Only Deployment
# =============================================================================
# This docker-compose.yml ONLY starts the Ubuntu VM container.
# All services (Traefik, TinyAuth, Dokploy, Kuma, Whoami) are deployed
# INSIDE the VM via StackKit CLI using DOCKER_HOST=tcp://vm:2375
#
# CORRECT DEPLOYMENT FLOW:
#   1. docker compose up -d vm        # Start VM only
#   2. docker compose run --rm -e DOCKER_HOST=tcp://vm:2375 cli stackkit init base-kit --non-interactive
#   3. docker compose run --rm -e DOCKER_HOST=tcp://vm:2375 cli stackkit apply --auto-approve
#
# VERIFICATION:
#   docker ps                          # Should ONLY show 'stackkits-vm' container
#   docker compose exec vm docker ps   # Should show all services (traefik, tinyauth, dokploy, etc.)
#
# Port Mapping:
#   - 2222:22     SSH access to VM
#   - 2375:2375   Docker daemon (for StackKit CLI to deploy into VM)
#   - 80:80       HTTP (Traefik in VM)
#   - 443:443     HTTPS (Traefik in VM)
#   - 8080:8080   Traefik dashboard (in VM)
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # VM Service: Ubuntu VM with Docker daemon
  # ---------------------------------------------------------------------------
  vm:
    build:
      context: ./dev/vm
      dockerfile: Dockerfile
    container_name: stackkits-vm
    restart: unless-stopped
    privileged: true
    environment:
      DOCKER_TLS_CERTDIR: ""
    ports:
      # SSH access
      - "${VM_SSH_PORT:-2222}:22"
      # Docker daemon (TCP) - for StackKit CLI to deploy INTO the VM
      - "${VM_DOCKER_PORT:-2375}:2375"
      # Layer 2: Traefik reverse proxy (services running IN the VM)
      - "${VM_HTTP_PORT:-80}:80"        # HTTP
      - "${VM_HTTPS_PORT:-443}:443"     # HTTPS
      - "${VM_TRAEFIK_PORT:-8080}:8080" # Traefik dashboard
      # Layer 3: base-kit services (running inside VM)
      - "${VM_WHOAMI_PORT:-9080}:9080"   # Whoami service
      - "${VM_KUMA_PORT:-4001}:4001"     # Uptime Kuma
      - "${VM_DOKPLOY_PORT:-4000}:4000"  # Dokploy
    volumes:
      # VM Docker data - persistent container storage
      - vm_docker:/var/lib/docker
      # SSH keys for VM access
      - ./dev/vm/authorized_keys:/authorized_keys:ro
      # Source code for development (optional)
      - .:/workspace:rw
    healthcheck:
      test: ["CMD", "docker", "info"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    networks:
      stackkits-net:
        aliases:
          - vm
          - dokploy.stack.local
          - kuma.stack.local
          - whoami.stack.local
          - auth.stack.local
          - traefik.stack.local
    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 1.1.1.1
    dns_search:
      - stack.local

  # ---------------------------------------------------------------------------
  # Orchestrator: Web UI with demo management + VM terminal
  # ---------------------------------------------------------------------------
  orchestrator:
    build:
      context: ./dev/orchestrator
      dockerfile: Dockerfile
    container_name: stackkits-orchestrator
    restart: unless-stopped
    ports:
      - "${ORCHESTRATOR_PORT:-9000}:9000"
    environment:
      DOMAIN: "${DOMAIN:-stack.local}"
      KOMBIFY_BASE_SUBDOMAIN: "${KOMBIFY_BASE_SUBDOMAIN:-}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/workspace:ro
    networks:
      - stackkits-net

  # ---------------------------------------------------------------------------
  # Portal: Dashboard with links to all services and demos
  # ---------------------------------------------------------------------------
  portal:
    image: nginx:alpine
    container_name: stackkits-portal
    restart: unless-stopped
    ports:
      - "${PORTAL_PORT:-9001}:80"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        cat > /etc/nginx/conf.d/default.conf << 'NGINXCONF'
        server {
          listen 80;
          root /usr/share/nginx/html;
          location /api/ {
            proxy_pass http://stackkits-orchestrator:9000;
            proxy_set_header Host $$host;
          }
        }
        NGINXCONF
        cat > /usr/share/nginx/html/index.html << 'PORTAL'
        <!DOCTYPE html>
        <html><head><meta charset="utf-8"><title>Your StackKit Deployment</title>
        <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--bg:#0f172a;--surface:#1e293b;--border:#334155;--text:#e2e8f0;--muted:#94a3b8;--dim:#64748b;--accent:#3b82f6;--green:#22c55e;--red:#ef4444;--amber:#f59e0b}
        body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:2rem}
        .wrap{max-width:1000px;margin:0 auto}
        .header{margin-bottom:2rem;display:flex;align-items:center;justify-content:space-between}
        .header-left h1{font-size:1.8rem;background:linear-gradient(135deg,#3b82f6,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:700}
        .header-left p{color:var(--muted);font-size:.85rem;margin-top:.2rem}
        .conn{font-size:.72rem;color:var(--dim);display:flex;align-items:center;gap:.4rem}
        .dot{width:8px;height:8px;border-radius:50%;display:inline-block}
        .dot-green{background:var(--green)}.dot-red{background:var(--red)}.dot-amber{background:var(--amber)}.dot-gray{background:var(--dim)}
        .summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:.75rem;margin-bottom:2rem}
        .stat{background:var(--surface);border:1px solid var(--border);border-radius:.5rem;padding:.75rem 1rem;text-align:center}
        .stat-value{font-size:1.2rem;font-weight:700;color:var(--text)}
        .stat-label{font-size:.7rem;color:var(--dim);text-transform:uppercase;letter-spacing:.05em;margin-top:.15rem}
        .section{margin-bottom:2rem}
        .section h2{font-size:.9rem;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;font-weight:600;margin-bottom:.75rem;display:flex;align-items:center;gap:.5rem}
        .layer-badge{font-size:.6rem;padding:.15rem .35rem;border-radius:.2rem;font-weight:500}
        .layer-l2{background:#1e3a5f;color:#60a5fa}.layer-l3{background:#1e3a2f;color:#4ade80}
        .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:.75rem}
        .card{background:var(--surface);border:1px solid var(--border);border-radius:.6rem;padding:1rem 1.15rem;text-decoration:none;color:var(--text);transition:all .2s;display:block}
        .card:hover{border-color:var(--accent);transform:translateY(-1px);box-shadow:0 4px 12px rgba(59,130,246,.15)}
        .card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:.35rem}
        .card-name{font-size:.95rem;font-weight:600;display:flex;align-items:center;gap:.4rem}
        .card-role{font-size:.6rem;padding:.12rem .3rem;border-radius:.2rem;background:#1e293b;border:1px solid var(--border);color:var(--muted)}
        .card-url{font-size:.72rem;color:var(--accent);margin-bottom:.3rem;word-break:break-all}
        .card-desc{font-size:.72rem;color:var(--dim);line-height:1.4}
        .config-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:.5rem}
        .config-item{background:var(--surface);border:1px solid var(--border);border-radius:.4rem;padding:.6rem .85rem;display:flex;justify-content:space-between;align-items:center}
        .config-key{font-size:.72rem;color:var(--dim)}.config-val{font-size:.78rem;color:var(--text);font-weight:500}
        footer{text-align:center;margin-top:2.5rem;padding-top:1.5rem;border-top:1px solid var(--border);color:var(--dim);font-size:.72rem}
        footer a{color:var(--accent);text-decoration:none}
        #loading{text-align:center;padding:3rem;color:var(--dim)}
        </style></head><body>
        <div class="wrap">
        <div class="header">
          <div class="header-left">
            <h1 id="kit-name">Your StackKit Deployment</h1>
            <p id="kit-subtitle">Loading deployment info...</p>
          </div>
          <div class="conn"><span class="dot dot-gray" id="conn-dot"></span><span id="conn-label">Connecting...</span></div>
        </div>
        <div class="summary" id="summary"></div>
        <div id="services"></div>
        <div class="section" id="config-section" style="display:none">
          <h2>Configuration</h2>
          <div class="config-grid" id="config"></div>
        </div>
        <footer>Deployed by <a href="https://kombify.dev/stackkits">kombify StackKits</a></footer>
        </div>
        <script>
        let deployment=null,healthData=null;
        const API=location.origin;

        async function fetchDeployment(){
          try{
            const r=await fetch(API+'/api/portal/deployment');
            deployment=await r.json();
            renderDeployment();
          }catch{document.getElementById('kit-subtitle').textContent='Could not load deployment info';}
        }
        async function fetchHealth(){
          try{
            const r=await fetch(API+'/api/portal/health');
            healthData=await r.json();
            const d=document.getElementById('conn-dot'),l=document.getElementById('conn-label');
            if(healthData.connected){d.className='dot dot-green';l.textContent='Connected';}
            else{d.className='dot dot-red';l.textContent='Disconnected';}
            updateHealthDots();
          }catch{
            document.getElementById('conn-dot').className='dot dot-red';
            document.getElementById('conn-label').textContent='Offline';
          }
        }
        function renderDeployment(){
          if(!deployment)return;
          const k=deployment.kit;
          document.getElementById('kit-name').textContent=k.name;
          document.getElementById('kit-subtitle').textContent=deployment.domain;
          // Summary stats
          const running=healthData?Object.values(healthData.services).filter(s=>s.state==='running').length:'-';
          document.getElementById('summary').innerHTML=
            stat(k.version,'Version')+stat(deployment.domain,'Domain')+
            stat(deployment.nodeCount,'Nodes')+stat(running+'/'+deployment.services.length,'Services');
          // Group by layer
          const layers={};
          deployment.services.forEach(s=>{if(!layers[s.layer])layers[s.layer]=[];layers[s.layer].push(s);});
          let html='';
          for(const[layer,svcs]of Object.entries(layers)){
            const cls=layer.includes('L2')?'layer-l2':'layer-l3';
            html+='<div class="section"><h2><span class="layer-badge '+cls+'">'+layer+'</span> Services</h2><div class="grid">';
            svcs.forEach(s=>{
              html+='<a class="card" href="'+s.url+'" target="_blank">'+
                '<div class="card-top"><span class="card-name"><span class="dot dot-gray" id="dot-'+s.name+'"></span>'+s.name+'</span>'+
                '<span class="card-role">'+s.role+'</span></div>'+
                '<div class="card-url">'+s.url+'</div>'+
                '<div class="card-desc">'+s.description+'</div></a>';
            });
            html+='</div></div>';
          }
          document.getElementById('services').innerHTML=html;
          // Config
          const c=deployment.config;
          document.getElementById('config-section').style.display='';
          document.getElementById('config').innerHTML=
            cfg('Auth',c.auth)+cfg('PaaS',c.paas)+cfg('Monitoring',c.monitoring)+cfg('Ingress',c.ingress)+cfg('TLS',c.tls);
          updateHealthDots();
        }
        function updateHealthDots(){
          if(!healthData||!healthData.services)return;
          for(const[name,info]of Object.entries(healthData.services)){
            const el=document.getElementById('dot-'+name);
            if(!el)continue;
            el.className='dot '+(info.health==='healthy'?'dot-green':info.state==='running'?'dot-amber':info.state==='not_found'?'dot-gray':'dot-red');
          }
          // Update running count in summary
          if(deployment){
            const running=Object.values(healthData.services).filter(s=>s.state==='running').length;
            const stats=document.querySelectorAll('.stat');
            if(stats[3])stats[3].querySelector('.stat-value').textContent=running+'/'+deployment.services.length;
          }
        }
        function stat(v,l){return '<div class="stat"><div class="stat-value">'+v+'</div><div class="stat-label">'+l+'</div></div>';}
        function cfg(k,v){return '<div class="config-item"><span class="config-key">'+k+'</span><span class="config-val">'+v+'</span></div>';}
        fetchDeployment();fetchHealth();
        setInterval(fetchHealth,5000);
        </script>
        </body></html>
        PORTAL
        nginx -g "daemon off;"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    depends_on:
      - orchestrator
    networks:
      - stackkits-net

  # ---------------------------------------------------------------------------
  # Persistent VM: Ubuntu reference environment (survives restarts)
  # ---------------------------------------------------------------------------
  # Unlike the demo VM, this environment is PERSISTENT:
  #   - Docker data, home directory, and /etc survive restarts
  #   - Use 'docker compose stop vm-persistent' — NEVER 'down -v'
  #   - Deploy your reference StackKit here and iterate on it
  #
  # Access:
  #   SSH:    ssh -p 2223 root@localhost
  #   Docker: DOCKER_HOST=tcp://localhost:2376 docker ps
  #   HTTP:   http://localhost:81  (Traefik in VM)
  # ---------------------------------------------------------------------------
  vm-persistent:
    build:
      context: ./dev/vm
      dockerfile: Dockerfile
    container_name: stackkits-vm-persistent
    restart: unless-stopped
    privileged: true
    environment:
      DOCKER_TLS_CERTDIR: ""
    ports:
      - "${PERSISTENT_SSH_PORT:-2223}:22"
      - "${PERSISTENT_DOCKER_PORT:-2376}:2375"
      - "${PERSISTENT_HTTP_PORT:-81}:80"
      - "${PERSISTENT_HTTPS_PORT:-444}:443"
      - "${PERSISTENT_TRAEFIK_PORT:-8081}:8080"
    volumes:
      # ALL persistent data — survives 'docker compose down' (without -v)
      - persistent_vm_docker:/var/lib/docker
      - persistent_vm_home:/root
      - persistent_vm_etc:/etc/ssh
      - ./dev/vm/authorized_keys:/authorized_keys:ro
      - .:/workspace:rw
    healthcheck:
      test: ["CMD", "docker", "info"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    networks:
      stackkits-net:
        aliases:
          - vm-persistent
    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 1.1.1.1
    profiles:
      - persistent

  # ---------------------------------------------------------------------------
  # DNS Service: Local DNS for .stack.local domains
  # ---------------------------------------------------------------------------
  dns:
    image: jpillora/dnsmasq:latest
    container_name: stackkits-dns
    ports:
      - "53:53/udp"
      - "53:53/tcp"
    environment:
      DNSMASQ_OPTS: |
        --address=/stack.local/172.30.0.10
        --address=/dokploy.stack.local/172.30.0.10
        --address=/kuma.stack.local/172.30.0.10
        --address=/whoami.stack.local/172.30.0.10
        --address=/auth.stack.local/172.30.0.10
        --address=/traefik.stack.local/172.30.0.10
        --listen-address=0.0.0.0
    networks:
      stackkits-net:
        ipv4_address: 172.30.0.53
    cap_add:
      - NET_ADMIN
    profiles:
      - dns

  # ---------------------------------------------------------------------------
  # StackKit CLI Service - Deploys INTO the VM (not on host)
  # ---------------------------------------------------------------------------
  cli:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stackkits-cli
    environment:
      # CRITICAL: Target the VM's Docker daemon, NOT the host
      DOCKER_HOST: tcp://vm:2375
      STACKKIT_BIN: stackkit
      DOMAIN: "stack.local"
      TRAEFIK_URL: "http://traefik.stack.local"
      AUTH_URL: "http://auth.stack.local"
      DOKPLOY_URL: "http://dokploy.stack.local"
      KUMA_URL: "http://kuma.stack.local"
      WHOAMI_URL: "http://whoami.stack.local"
    volumes:
      - .:/workspace:rw
      - ./dev/vm/authorized_keys:/root/.ssh/authorized_keys:ro
    working_dir: /workspace
    command: ["tail", "-f", "/dev/null"]
    depends_on:
      vm:
        condition: service_healthy
    networks:
      stackkits-net:
        aliases:
          - dokploy.stack.local
          - kuma.stack.local
          - whoami.stack.local
          - auth.stack.local
          - traefik.stack.local
    dns:
      - 8.8.8.8
      - 8.8.4.4
    dns_search:
      - stack.local
    profiles:
      - cli

  # ---------------------------------------------------------------------------
  # E2E Test Runner Service
  # ---------------------------------------------------------------------------
  e2e:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stackkits-e2e
    environment:
      # CRITICAL: Target the VM's Docker daemon, NOT the host
      DOCKER_HOST: tcp://vm:2375
      STACKKIT_BIN: stackkit
      TIMEOUT: "300"
      TEST_PERSISTENCE: "true"
      TEST_SECURITY: "true"
      DOMAIN: "stack.local"
      TRAEFIK_URL: "http://traefik.stack.local"
      AUTH_URL: "http://auth.stack.local"
      DOKPLOY_URL: "http://dokploy.stack.local"
      KUMA_URL: "http://kuma.stack.local"
      WHOAMI_URL: "http://whoami.stack.local"
    volumes:
      - .:/workspace:rw
    working_dir: /workspace
    command: ["./base-kit/tests/e2e_test.sh"]
    depends_on:
      vm:
        condition: service_healthy
      dns:
        condition: service_started
    networks:
      stackkits-net:
        aliases:
          - dokploy.stack.local
          - kuma.stack.local
          - whoami.stack.local
          - auth.stack.local
          - traefik.stack.local
    dns:
      - 172.30.0.53
    dns_search:
      - stack.local
    profiles:
      - e2e

# =============================================================================
# PERSISTENT VOLUMES - ONLY for VM data
# =============================================================================
# Services (traefik, tinyauth, dokploy, kuma) are deployed INSIDE the VM
# and use volumes created within the VM's Docker daemon.

volumes:
  # VM Docker data - stores all containers/images inside the VM
  vm_docker:
    driver: local
  # Persistent VM volumes — NEVER use 'down -v' on these
  persistent_vm_docker:
    driver: local
  persistent_vm_home:
    driver: local
  persistent_vm_etc:
    driver: local

# =============================================================================
# NETWORKS
# =============================================================================

networks:
  stackkits-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/16
          gateway: 172.30.0.1
