services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stackkits-marketing
    ports:
      - "3000:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - stackkits-network

networks:
  stackkits-network:
    driver: bridge
