name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  GO_VERSION: "1.24"

jobs:
  test:
    name: Test before release
    runs-on: ${{ vars.BUILD_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run tests
        run: go test ./...

  validate-archive:
    name: Validate release archive
    runs-on: ${{ vars.BUILD_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build dry-run archive
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --snapshot --clean

      - name: Verify archive contents
        run: |
          set -euo pipefail
          MISSING=0

          check_archive() {
            local LABEL="$1"
            local PATTERN="$2"
            shift 2

            echo ""
            echo "=== Checking $LABEL archive ==="
            ARCHIVE=$(find dist/ -name "$PATTERN" | head -1)
            if [ -z "$ARCHIVE" ]; then
              echo "FAIL: No archive matching $PATTERN found in dist/"
              ls -la dist/
              MISSING=$((MISSING + 1))
              return
            fi

            echo "Archive: $ARCHIVE"
            tar tzf "$ARCHIVE" | sort > /tmp/archive-files.txt

            for f in "$@"; do
              if ! grep -q "^${f}$" /tmp/archive-files.txt; then
                echo "FAIL: Missing required file: $f"
                MISSING=$((MISSING + 1))
              fi
            done
            echo "OK: $LABEL archive checked."
          }

          # Common files required in ALL archives
          COMMON=(
            "stackkit"
            "README.md"
            "LICENSE"
          )

          # Base schemas required in ALL archives
          BASE_SCHEMAS=(
            "base/stackkit.cue"
            "base/layers.cue"
            "base/identity.cue"
            "base/network.cue"
            "base/security.cue"
          )

          # Per-kit required files
          BASE_KIT_FILES=(
            "base-kit/stackkit.yaml"
            "base-kit/services.cue"
            "base-kit/defaults.cue"
            "base-kit/stackfile.cue"
            "base-kit/default-spec.yaml"
            "base-kit/templates/simple/main.tf"
          )

          HA_KIT_FILES=(
            "ha-kit/stackkit.yaml"
            "ha-kit/services.cue"
            "ha-kit/defaults.cue"
            "ha-kit/stackfile.cue"
          )

          MODERN_FILES=(
            "modern-homelab/stackkit.yaml"
            "modern-homelab/services.cue"
            "modern-homelab/defaults.cue"
            "modern-homelab/stackfile.cue"
          )

          # Check full bundle
          check_archive "full bundle" \
            "stackkits_*_linux_amd64.tar.gz" \
            "${COMMON[@]}" "${BASE_SCHEMAS[@]}" "${BASE_KIT_FILES[@]}" "${HA_KIT_FILES[@]}" "${MODERN_FILES[@]}"

          # Check per-kit archives (only base-kit for now)
          check_archive "base-kit" \
            "stackkits-base-kit_*_linux_amd64.tar.gz" \
            "${COMMON[@]}" "${BASE_SCHEMAS[@]}" "${BASE_KIT_FILES[@]}"

          # TODO: add ha-kit and modern-homelab archive checks when they graduate from alpha

          echo ""
          if [ "$MISSING" -gt 0 ]; then
            echo "FAIL: $MISSING required files missing across archives!"
            echo "Update .goreleaser.yaml 'files:' section to include them."
            exit 1
          fi

          echo "OK: All archives validated successfully."

  release:
    name: Release
    needs: [test, validate-archive]
    runs-on: ${{ vars.BUILD_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
