# =============================================================================
# Dev Homelab - Hybrid Architecture (Docker Compose Version)
# =============================================================================
# For environments where Terraform is not available
#
# Layer 2 (PLATFORM):
#   ├── Traefik (reverse proxy)
#   ├── TinyAuth (identity)
#   ├── Dokploy (PAAS controller)
#   └── Dokploy PostgreSQL
#
# Layer 3 (APPLICATIONS): Deployed via Dokploy after this stack is running
# =============================================================================

version: "3.8"

services:
  # ===========================================================================
  # LAYER 2: PLATFORM - TRAEFIK REVERSE PROXY
  # ===========================================================================
  traefik:
    image: traefik:v3.1
    container_name: traefik
    restart: unless-stopped
    user: "0:0"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    networks:
      - dev_net
    volumes:
      - traefik-data:/etc/traefik
      - traefik-certs:/letsencrypt
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command:
      - --api.dashboard=true
      - --api.insecure=true
      - --ping=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=dev_net
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.local.acme.tlschallenge=true
      - --certificatesresolvers.local.acme.email=admin@stack.local
      - --certificatesresolvers.local.acme.storage=/letsencrypt/acme.json
      - --log.level=INFO
      - --accesslog=true
    environment:
      - TZ=Europe/Berlin
    labels:
      - "stackkit.layer=2-platform"
      - "stackkit.service=traefik"
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`traefik.stack.local`)"
      - "traefik.http.routers.traefik.service=api@internal"
      - "traefik.http.routers.traefik.entrypoints=web"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ===========================================================================
  # LAYER 1: FOUNDATION - TINYAUTH IDENTITY
  # ===========================================================================
  tinyauth:
    image: ghcr.io/steveiliop56/tinyauth:v3
    container_name: tinyauth
    restart: unless-stopped
    user: "1000:1000"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    networks:
      - dev_net
    volumes:
      - tinyauth-data:/data
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    environment:
      - TZ=Europe/Berlin
      - APP_URL=http://auth.stack.local
      - SECRET=01234567890123456789012345678901
      # Default: admin / admin123
      - "USERS=admin:$$2a$$10$$N9qo8uLOickgx2ZMRZoMy.MqrI0N3p9zqNVvB6fCNCkKeTLQ9b1Vy"
      - APP_WHITELIST=dokploy,traefik,kuma,whoami
    labels:
      - "stackkit.layer=1-foundation"
      - "stackkit.service=tinyauth"
      - "traefik.enable=true"
      - "traefik.http.routers.tinyauth.rule=Host(`auth.stack.local`)"
      - "traefik.http.routers.tinyauth.entrypoints=web"
      - "traefik.http.services.tinyauth.loadbalancer.server.port=3000"
      # ForwardAuth middleware
      - "traefik.http.middlewares.tinyauth.forwardauth.address=http://tinyauth:3000/api/auth/verify"
      - "traefik.http.middlewares.tinyauth.forwardauth.authResponseHeaders=X-User,X-Email"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      traefik:
        condition: service_healthy

  # ===========================================================================
  # LAYER 2: PLATFORM - DOKPLOY REDIS
  # ===========================================================================
  dokploy-redis:
    image: redis:7-alpine
    container_name: dokploy-redis
    restart: unless-stopped
    user: "999:999"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - internal_db
    volumes:
      - dokploy-redis-data:/data
    command: redis-server --appendonly yes
    labels:
      - "stackkit.layer=2-platform"
      - "stackkit.service=dokploy-redis"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # ===========================================================================
  # LAYER 2: PLATFORM - DOKPLOY DATABASE
  # ===========================================================================
  dokploy-postgres:
    image: postgres:16-alpine
    container_name: dokploy-postgres
    restart: unless-stopped
    user: "999:999"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - internal_db
    volumes:
      - dokploy-postgres-data:/var/lib/postgresql/data
    tmpfs:
      - /tmp:noexec,nosuid,size=256m
    environment:
      - POSTGRES_USER=dokploy
      - POSTGRES_PASSWORD=${DOKPLOY_DB_PASSWORD:-dokploy}
      - POSTGRES_DB=dokploy
      - PGDATA=/var/lib/postgresql/data/pgdata
    labels:
      - "stackkit.layer=2-platform"
      - "stackkit.service=dokploy-postgres"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dokploy -d dokploy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ===========================================================================
  # LAYER 2: PLATFORM - DOKPLOY PAAS
  # ===========================================================================
  dokploy:
    image: dokploy/dokploy:latest
    container_name: dokploy
    restart: unless-stopped
    user: "0:0"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    networks:
      - dev_net
      - internal_db
    volumes:
      - dokploy-data:/etc/dokploy
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DOCKER_HOST=unix:///var/run/docker.sock
      - DATABASE_URL=postgresql://dokploy:${DOKPLOY_DB_PASSWORD:-dokploy}@dokploy-postgres:5432/dokploy
      - NODE_ENV=production
      - PORT=3000
      - TRPC_PLAYGROUND=false
      - LETSENCRYPT_EMAIL=admin@stack.local
      - TRAEFIK_ENABLED=true
      - TRAEFIK_NETWORK=dev_net
    labels:
      - "stackkit.layer=2-platform"
      - "stackkit.service=dokploy"
      - "traefik.enable=true"
      - "traefik.http.routers.dokploy.rule=Host(`dokploy.stack.local`)"
      - "traefik.http.routers.dokploy.entrypoints=web"
      - "traefik.http.routers.dokploy.service=dokploy"
      - "traefik.http.routers.dokploy.middlewares=tinyauth@docker"
      - "traefik.http.services.dokploy.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      dokploy-postgres:
        condition: service_healthy
      dokploy-redis:
        condition: service_healthy
      traefik:
        condition: service_healthy

networks:
  dev_net:
    name: dev_net
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16
    labels:
      - "stackkit.layer=2-platform"
  internal_db:
    name: dev_net_db
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.22.0.0/24
    labels:
      - "stackkit.layer=2-platform"

volumes:
  # Layer 1: Foundation
  tinyauth-data:
    name: tinyauth-data
    labels:
      - "stackkit.layer=1-foundation"
      - "stackkit.backup=required"
  # Layer 2: Platform
  traefik-data:
    name: traefik-data
    labels:
      - "stackkit.layer=2-platform"
  traefik-certs:
    name: traefik-certs
    labels:
      - "stackkit.layer=2-platform"
      - "stackkit.backup=required"
  dokploy-data:
    name: dokploy-data
    labels:
      - "stackkit.layer=2-platform"
      - "stackkit.backup=required"
  dokploy-postgres-data:
    name: dokploy-postgres-data
    labels:
      - "stackkit.layer=2-platform"
      - "stackkit.backup=required"
  dokploy-redis-data:
    name: dokploy-redis-data
    labels:
      - "stackkit.layer=2-platform"
      - "stackkit.backup=required"
