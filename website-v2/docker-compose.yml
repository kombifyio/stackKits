services:
  stackkits-website-v2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stackkits-website-v2
    ports:
      - "8081:80"
    environment:
      # Allow embedding in kombify Cloud portal (iframe frame-ancestors)
      ALLOWED_FRAME_ORIGINS: ${ALLOWED_FRAME_ORIGINS:-http://localhost:5290}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "com.stackkits.description=StackKits Marketing Website v2 (Svelte)"
